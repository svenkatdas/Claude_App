<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, getDocs }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
           signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  // ── Firebase Config ────────────────────────────────────────────────────────
   const firebaseConfig = {
                 apiKey:            "AIzaSyCm5V7AfWZ4nu1goC6rvPFk5i5CJ_DTTKI",
                 authDomain:        "health-8bf9e.firebaseapp.com",
                 projectId:         "health-8bf9e",
                 storageBucket:     "health-8bf9e.firebasestorage.app",
                 messagingSenderId: "337607108367",
                 appId:             "1:337607108367:web:9209c3ec283765a434c07a"
      };


  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  // ── Admin ──────────────────────────────────────────────────────────────────
  const ADMIN_EMAIL = 'always.wired@gmail.com';

  // ── App State ─────────────────────────────────────────────────────────────
  let categories    = [];
  let nextCatId     = 1;
  let nextTaskId    = 1;
  let nextSubcatId    = 1;
  let nextSubSubcatId = 1;
  let currentUser   = null;
  let authMode      = 'signin';
  let activeCatId   = null;
  let activeSubcatId = null; // null = "All", or a subcategory id
  let activeSubSubcatId = null; // null = "All", or a sub-subcategory id
  let tipCollapsedGroups = new Set(); // tracks which cat IDs are collapsed in TIP panel
  let tipCollapsedPriorityGroups = new Set(); // tracks which priority keys are collapsed in TIP panel
  let catOpenSections = {};           // catId → Set of open subcatIds

  const MAX_CATS = 6;
  const FIXED_CATEGORIES = ['Health & Fitness', 'Finance', 'Family & Friends', 'Lifestyle', 'Innovations', 'Stress Mgmt'];
  const TIP_TAB_ID = 'tasks-in-progress'; // Special sentinel for the TIP tab

  const STATUSES = [
    { key: 'not-started', label: 'Not Started', cls: 'status-not-started' },
    { key: 'in-progress', label: 'In Progress', cls: 'status-in-progress' },
    { key: 'done',        label: 'Done',        cls: 'status-done'        },
    { key: 'blocked',     label: 'Blocked',     cls: 'status-blocked'     },
  ];

  const PRIORITIES = [
    { key: 'critical', label: 'Critical', cls: 'priority-critical', dot: '🔴' },
    { key: 'high',     label: 'High',     cls: 'priority-high',     dot: '🟠' },
    { key: 'medium',   label: 'Medium',   cls: 'priority-medium',   dot: '🟡' },
    { key: 'low',      label: 'Low',      cls: 'priority-low',      dot: '🟢' },
  ];
  const PRIORITY_ORDER = ['critical', 'high', 'medium', 'low', null];

  function statusInfo(key) { return STATUSES.find(s => s.key === key) || STATUSES[0]; }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Notes Modal State ──────────────────────────────────────────────────────
  let _notesCatId  = null;
  let _notesTaskId = null;

  // ── Firestore: Load & Save ─────────────────────────────────────────────────
  async function loadData(uid) {
    try {
      const snap = await getDoc(doc(db, 'users', uid));
      if (snap.exists()) {
        const data = snap.data();
        categories   = data.categories   || [];
        nextCatId    = data.nextCatId    || 1;
        nextTaskId   = data.nextTaskId   || 1;
        nextSubcatId = data.nextSubcatId || 1;
        nextSubSubcatId = data.nextSubSubcatId || 1;
        if (categories.length) {
          const maxCat = Math.max(...categories.map(c => c.id));
          if (maxCat >= nextCatId) nextCatId = maxCat + 1;
        }
        const allTasks = categories.flatMap(c => c.tasks || []);
        if (allTasks.length) {
          const maxTask = Math.max(...allTasks.map(t => t.id));
          if (maxTask >= nextTaskId) nextTaskId = maxTask + 1;
        }
        const allSubcats = categories.flatMap(c => c.subcategories || []);
        if (allSubcats.length) {
          const maxSub = Math.max(...allSubcats.map(s => s.id));
          if (maxSub >= nextSubcatId) nextSubcatId = maxSub + 1;
        }
        const allSubSubcats = categories.flatMap(c => (c.subcategories || []).flatMap(s => s.subsubcategories || []));
        if (allSubSubcats.length) {
          const maxSSub = Math.max(...allSubSubcats.map(ss => ss.id));
          if (maxSSub >= nextSubSubcatId) nextSubSubcatId = maxSSub + 1;
        }
      }
    } catch (e) {
      console.error('Error loading data:', e);
    }

    // If no categories yet, seed the fixed five
    if (!categories.length) {
      categories = FIXED_CATEGORIES.map(name => ({
        id: nextCatId++, name, tasks: [], subcategories: [], open: true
      }));
      await saveData();
    }

    // Ensure all five fixed categories always exist (by name), preserving tasks
    FIXED_CATEGORIES.forEach(name => {
      if (!categories.find(c => c.name === name)) {
        categories.push({ id: nextCatId++, name, tasks: [], subcategories: [], open: true });
      }
    });
    // Keep only the five fixed categories
    categories = FIXED_CATEGORIES.map(name => categories.find(c => c.name === name));
    // Ensure every category has a subcategories array
    categories.forEach(c => {
      if (!c.subcategories) c.subcategories = [];
      c.subcategories.forEach(s => { if (!s.subsubcategories) s.subsubcategories = []; });
    });

    render();
  }

  let saveTimer = null;
  async function saveData() {
    if (!currentUser) return;
    const ind = document.getElementById('save-indicator');
    ind.classList.add('visible');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => ind.classList.remove('visible'), 1500);
    try {
      await setDoc(doc(db, 'users', currentUser.uid), {
        categories,
        nextCatId,
        nextTaskId,
        nextSubcatId,
        nextSubSubcatId,
        email: currentUser.email,
        updatedAt: new Date().toISOString()
      });
    } catch (e) {
      console.error('Error saving data:', e);
    }
  }

  // ── Auth State ────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    document.getElementById('loading-screen').style.display = 'none';
    if (user) {
      currentUser = user;
      document.getElementById('auth-screen').style.display  = 'none';
      document.getElementById('user-info').style.display    = 'flex';
      document.getElementById('user-email-display').textContent = user.email;
      await loadData(user.uid);
      // Always persist email in user doc (captures existing users on their next login)
      try {
        await setDoc(doc(db, 'users', user.uid), { email: user.email }, { merge: true });
      } catch(e) { /* non-critical */ }
      // Show Admin Panel button ONLY for the administrator
      const adminBtn = document.getElementById('admin-panel-btn');
      if (user.email === ADMIN_EMAIL) {
        adminBtn.style.display = 'inline-flex';
      } else {
        adminBtn.style.display = 'none';
        hideAdminView(); // ensure admin view is never visible to non-admins
      }
    } else {
      currentUser = null;
      categories  = [];
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('user-info').style.display   = 'none';
      render();
    }
  });

  // ── Auth UI ───────────────────────────────────────────────────────────────
  async function submitAuth() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    errEl.textContent = '';

    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

    const btn = document.getElementById('auth-submit-btn');
    btn.textContent = authMode === 'signup' ? 'Creating account…' : 'Signing in…';
    btn.disabled = true;

    try {
      if (authMode === 'signup') {
        await createUserWithEmailAndPassword(auth, email, password);
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
    } catch (e) {
      const msgs = {
        'auth/user-not-found':         'No account found with this email.',
        'auth/wrong-password':         'Incorrect password.',
        'auth/invalid-credential':     'Incorrect email or password.',
        'auth/email-already-in-use':   'An account with this email already exists.',
        'auth/invalid-email':          'Please enter a valid email address.',
        'auth/too-many-requests':      'Too many attempts. Please try again later.',
        'auth/network-request-failed': 'Network error. Check your connection.',
      };
      errEl.textContent = msgs[e.code] || 'Something went wrong. Please try again.';
      btn.textContent = authMode === 'signup' ? 'Sign Up' : 'Sign In';
      btn.disabled = false;
    }
  }

  function toggleAuthMode() {
    authMode = authMode === 'signin' ? 'signup' : 'signin';
    const isSignUp = authMode === 'signup';
    document.getElementById('auth-subtitle').textContent    = isSignUp ? 'Create your account' : 'Sign in to your account';
    document.getElementById('auth-submit-btn').textContent  = isSignUp ? 'Sign Up' : 'Sign In';
    document.getElementById('auth-submit-btn').disabled     = false;
    document.getElementById('auth-switch-text').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
    document.getElementById('auth-switch-link').textContent = isSignUp ? ' Sign In' : ' Sign Up';
    document.getElementById('auth-error').textContent       = '';
  }

  document.getElementById('auth-submit-btn').addEventListener('click', submitAuth);
  document.getElementById('auth-switch-link').addEventListener('click', toggleAuthMode);
  ['auth-email', 'auth-password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') submitAuth();
    });
  });
  document.getElementById('signout-btn').addEventListener('click', () => {
    hideAdminView();
    adminPanelLoaded = false;
    signOut(auth);
  });
  document.getElementById('admin-panel-btn').addEventListener('click', () => {
    const isOpen = document.getElementById('admin-view').style.display !== 'none';
    if (isOpen) { hideAdminView(); } else { showAdminView(); }
  });

  // ── Admin Panel ───────────────────────────────────────────────────────────
  let adminPanelLoaded = false;

  async function loadAdminPanel() {
    const panel = document.getElementById('admin-panel-content');
    panel.innerHTML = `<div class="admin-panel-inner"><div class="admin-panel-header"><span class="admin-panel-icon">🔐</span><span class="admin-panel-title">Admin: Registered Users</span><span class="admin-panel-count">Loading…</span></div><div class="admin-email-list"><div class="admin-empty">Loading user list…</div></div></div>`;

    try {
      const snap = await getDocs(collection(db, 'users'));
      const emails = [];
      snap.forEach(d => {
        const data = d.data();
        if (data.email && data.email !== ADMIN_EMAIL) {
          emails.push(data.email);
        }
      });
      emails.sort();

      panel.innerHTML = `
        <div class="admin-panel-inner">
          <div class="admin-panel-header">
            <span class="admin-panel-icon">🔐</span>
            <span class="admin-panel-title">Admin: Registered Users</span>
            <span class="admin-panel-count">${emails.length} user${emails.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="admin-email-list">
            ${emails.length === 0
              ? '<div class="admin-empty">No users have signed up yet.</div>'
              : emails.map(e => `<div class="admin-email-row">📧 ${esc(e)}</div>`).join('')}
          </div>
        </div>`;
      adminPanelLoaded = true;
    } catch (err) {
      console.error('Admin panel error:', err);
      panel.innerHTML = `<div class="admin-panel-inner"><div class="admin-panel-header"><span class="admin-panel-icon">🔐</span><span class="admin-panel-title">Admin: Registered Users</span></div><div class="admin-email-list"><div class="admin-empty">⚠️ Could not load user list. Check Firestore security rules.</div></div></div>`;
    }
  }

  function showAdminView() {
    document.getElementById('admin-view').style.display  = 'block';
    document.getElementById('app-main').style.display    = 'none';
    document.getElementById('cat-menu-section').style.display = 'none';
    document.getElementById('admin-panel-btn').classList.add('active');
    document.getElementById('admin-panel-btn').textContent = '✕ Close Admin';
    if (!adminPanelLoaded) loadAdminPanel();
  }

  function hideAdminView() {
    document.getElementById('admin-view').style.display  = 'none';
    document.getElementById('app-main').style.display    = 'block';
    document.getElementById('cat-menu-section').style.display = 'block';
    document.getElementById('admin-panel-btn').classList.remove('active');
    document.getElementById('admin-panel-btn').textContent = '🔐 Admin Panel';
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const list  = document.getElementById('categories-list');
    const menuSection = document.getElementById('cat-menu-section');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';
    menuSection.innerHTML = '';

    empty.style.display = categories.length ? 'none' : 'block';
    if (!categories.length) { updateStats(); return; }

    // Ensure activeCatId is valid
    if (activeCatId !== TIP_TAB_ID && !categories.find(c => c.id === activeCatId)) {
      activeCatId    = categories[0].id;
      activeSubcatId = null;
    }

    // ── Top category tab menu ──
    const menuWrap = document.createElement('div');
    menuWrap.className = 'cat-menu-wrap';

    // ── Tasks in Progress special tab (first) ──
    {
      const tipTotal  = categories.flatMap(c => c.tasks).filter(t => t.status === 'in-progress').length;
      const isActive  = activeCatId === TIP_TAB_ID;
      const tab = document.createElement('button');
      tab.className      = 'cat-tab tip-tab' + (isActive ? ' active' : '');
      tab.dataset.action = 'select-tab';
      tab.dataset.cat    = TIP_TAB_ID;
      tab.innerHTML = `
        <span class="cat-tab-name">🔄 In Progress</span>
        <span class="cat-tab-meta">
          <span>${tipTotal} task${tipTotal !== 1 ? 's' : ''}</span>
        </span>
        <div class="cat-tab-bar">
          <div class="cat-tab-progress" style="width:${tipTotal > 0 ? 100 : 0}%"></div>
        </div>`;
      menuWrap.appendChild(tab);
    }

    categories.forEach(cat => {
      const total    = cat.tasks.length;
      const done     = cat.tasks.filter(t => t.status === 'done').length;
      const pct      = total ? Math.round(done / total * 100) : 0;
      const isActive = cat.id === activeCatId;

      // Determine color tier
      let pctClass = '';
      if (total === 0 || pct < 50)        pctClass = 'pct-low';
      else if (pct >= 50 && pct < 100)    pctClass = 'pct-mid';
      else                                 pctClass = 'pct-done';

      const tab = document.createElement('button');
      tab.className      = `cat-tab ${pctClass}` + (isActive ? ' active' : '');
      tab.dataset.action = 'select-tab';
      tab.dataset.cat    = cat.id;
      tab.innerHTML = `
        <span class="cat-tab-name">${esc(cat.name)}</span>
        <span class="cat-tab-meta">
          <span>${done}/${total}</span>
          <span class="cat-tab-pct">${pct}%</span>
        </span>
        <div class="cat-tab-bar">
          <div class="cat-tab-progress" style="width:${pct}%"></div>
        </div>`;
      menuWrap.appendChild(tab);
    });

    menuSection.appendChild(menuWrap);

    // ── Tasks in Progress panel ──
    if (activeCatId === TIP_TAB_ID) {
      // Collect all in-progress tasks with their cat reference
      const allInProgress = categories.flatMap(cat =>
        cat.tasks
          .filter(t => t.status === 'in-progress')
          .map(t => ({ cat, task: t }))
      );

      const totalInProgress = allInProgress.length;

      const tipPanel = document.createElement('div');
      tipPanel.className = 'tip-panel';

      tipPanel.innerHTML = `
        <div class="tip-header">
          <span class="tip-header-icon">🔄</span>
          <span class="tip-header-title">Tasks in Progress</span>
          <span class="tip-header-count">${totalInProgress} task${totalInProgress !== 1 ? 's' : ''}</span>
        </div>`;

      if (allInProgress.length === 0) {
        tipPanel.innerHTML += `
          <div class="tip-empty">
            <div class="icon">✅</div>
            <strong>All clear!</strong>
            <span>No tasks are currently in progress.</span>
          </div>`;
      } else {
        // Group by priority in order: critical, high, medium, low, then null (none)
        PRIORITY_ORDER.forEach(priKey => {
          const group = allInProgress.filter(({ task }) => (task.priority || null) === priKey);
          if (group.length === 0) return;

          const priInfo = priKey ? PRIORITIES.find(p => p.key === priKey) : null;
          const priLabel = priInfo ? priInfo.label : 'No Priority';
          const priDot   = priInfo ? priInfo.dot : '⚪';
          const priCls   = priKey ? `pri-${priKey}` : 'pri-none';
          const collapseKey = priKey || 'none';
          const isCollapsed = tipCollapsedPriorityGroups.has(collapseKey);

          const groupEl = document.createElement('div');
          groupEl.className = 'tip-priority-group';

          const labelEl = document.createElement('div');
          labelEl.className = `tip-priority-label ${priCls}` + (isCollapsed ? ' collapsed' : '');
          labelEl.dataset.action = 'toggle-tip-priority-group';
          labelEl.dataset.prikey = collapseKey;
          labelEl.innerHTML = `
            <span style="font-size:0.9rem;">${priDot}</span>
            <span class="tip-priority-name">${priLabel}</span>
            <span class="tip-priority-count">${group.length}</span>
            <span class="tip-priority-chevron">▼</span>`;
          groupEl.appendChild(labelEl);

          const tasksWrap = document.createElement('div');
          tasksWrap.className = 'tip-priority-tasks' + (isCollapsed ? ' collapsed' : '');
          tasksWrap.innerHTML = group.map(({ cat, task: t }) => {
            const sub = t.subcatId != null
              ? (cat.subcategories || []).find(s => s.id === t.subcatId)
              : null;
            const ssub = (sub && t.subsubcatId != null)
              ? (sub.subsubcategories || []).find(ss => ss.id === t.subsubcatId)
              : null;
            const si       = statusInfo(t.status);
            const hasNotes = t.notes && t.notes.trim() !== '' && t.notes !== '<br>';
            return `
              <div class="tip-task-row">
                <div class="task-check"
                  data-action="quick-toggle" data-cat="${cat.id}" data-task="${t.id}" title="Toggle done"></div>
                <button class="task-link ${hasNotes ? 'has-notes' : ''}"
                  id="task-name-${t.id}"
                  data-action="open-task-editor" data-cat="${cat.id}" data-task="${t.id}"
                  title="Click to edit task">${esc(t.name)}</button>
                <span class="tip-cat-badge">${esc(cat.name)}</span>
                ${sub ? `<span class="tip-subcat-badge">${esc(sub.name)}</span>` : ''}
                ${ssub ? `<span class="tip-subcat-badge" style="background:#ede9fe;color:#5b21b6;">${esc(ssub.name)}</span>` : ''}
                ${prioritySelectHTML(cat.id, t.id, t.priority || null)}
                <button class="status-badge ${si.cls}"
                  data-action="open-status" data-cat="${cat.id}" data-task="${t.id}">${si.label}</button>
                <div class="task-actions">
                  <button class="btn-icon" data-action="delete-task" data-cat="${cat.id}" data-task="${t.id}" title="Delete">🗑️</button>
                </div>
              </div>`;
          }).join('');
          groupEl.appendChild(tasksWrap);
          tipPanel.appendChild(groupEl);
        });
      }

      list.appendChild(tipPanel);
      updateStats();
      return;
    }

    // ── Active category panel ──
    const cat = categories.find(c => c.id === activeCatId);
    if (!cat) { updateStats(); return; }

    const subcats = cat.subcategories || [];

    // Validate activeSubcatId
    if (activeSubcatId !== null && !subcats.find(s => s.id === activeSubcatId)) {
      activeSubcatId = subcats.length ? subcats[0].id : null;
    }
    // Auto-select first subcategory if none selected and subcats exist
    if (activeSubcatId === null && subcats.length > 0) {
      activeSubcatId = subcats[0].id;
    }

    const panel = document.createElement('div');
    panel.className = 'cat-panel';
    panel.id = `cat-${cat.id}`;

    // ── Left: Subcategory sidebar ──
    const sidebar = document.createElement('div');
    sidebar.className = 'subcat-sidebar';

    const sidebarTitle = document.createElement('div');
    sidebarTitle.className = 'subcat-sidebar-title';
    sidebarTitle.textContent = 'Subcategories';
    sidebar.appendChild(sidebarTitle);

    const subcatList = document.createElement('div');
    subcatList.className = 'subcat-list';

    subcats.forEach(sub => {
      const subTaskCount = cat.tasks.filter(t => t.subcatId === sub.id).length;
      const isActiveSub  = activeSubcatId === sub.id;
      const row = document.createElement('div');
      row.className = 'subcat-row' + (isActiveSub ? ' active' : '');
      row.innerHTML = `
        <button class="subcat-row-btn" data-action="select-subcat" data-cat="${cat.id}" data-subcat="${sub.id}">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(sub.name)}</span>
          <span class="subcat-row-count">${subTaskCount}</span>
        </button>
        <div class="subcat-row-actions">
          <button class="subcat-rename-btn" data-action="rename-subcat" data-cat="${cat.id}" data-subcat="${sub.id}" title="Rename">✏️</button>
          <button class="subcat-delete-btn" data-action="delete-subcat" data-cat="${cat.id}" data-subcat="${sub.id}" title="Delete">🗑️</button>
        </div>`;
      subcatList.appendChild(row);
    });
    sidebar.appendChild(subcatList);

    // Add subcategory button at bottom of sidebar
    const addSubRow = document.createElement('div');
    addSubRow.className = 'subcat-add-row';
    const addSubBtn = document.createElement('button');
    addSubBtn.className      = 'subcat-add-btn';
    addSubBtn.dataset.action = 'add-subcat';
    addSubBtn.dataset.cat    = cat.id;
    addSubBtn.textContent    = '+ Add Subcategory';
    addSubRow.appendChild(addSubBtn);
    sidebar.appendChild(addSubRow);

    panel.appendChild(sidebar);

    // ── Middle: Sub-Subcategory sidebar ──
    if (activeSubcatId !== null) {
      const activeSub = subcats.find(s => s.id === activeSubcatId);
      const subsubcats = (activeSub && activeSub.subsubcategories) || [];

      const subsubSidebar = document.createElement('div');
      subsubSidebar.className = 'subsubcat-sidebar';

      const subsubTitle = document.createElement('div');
      subsubTitle.className = 'subsubcat-sidebar-title';
      subsubTitle.innerHTML = `<span>Sub-Subcategories</span>`;
      subsubSidebar.appendChild(subsubTitle);

      const subsubList = document.createElement('div');
      subsubList.className = 'subsubcat-list';

      // "All" row
      const allSubSubTaskCount = cat.tasks.filter(t => t.subcatId === activeSubcatId).length;
      const isAllActive = activeSubSubcatId === null;
      const allRow = document.createElement('div');
      allRow.className = 'subsubcat-all-row' + (isAllActive ? ' active' : '');
      allRow.innerHTML = `
        <button class="subsubcat-all-btn" data-action="select-subsubcat" data-cat="${cat.id}" data-subcat="${activeSubcatId}" data-subsubcat="">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">All</span>
          <span class="subsubcat-row-count">${allSubSubTaskCount}</span>
        </button>`;
      subsubList.appendChild(allRow);

      subsubcats.forEach(ssub => {
        const ssTaskCount  = cat.tasks.filter(t => t.subcatId === activeSubcatId && t.subsubcatId === ssub.id).length;
        const isActiveSSub = activeSubSubcatId === ssub.id;
        const row = document.createElement('div');
        row.className = 'subsubcat-row' + (isActiveSSub ? ' active' : '');
        row.innerHTML = `
          <button class="subsubcat-row-btn" data-action="select-subsubcat" data-cat="${cat.id}" data-subcat="${activeSubcatId}" data-subsubcat="${ssub.id}">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(ssub.name)}</span>
            <span class="subsubcat-row-count">${ssTaskCount}</span>
          </button>
          <div class="subsubcat-row-actions">
            <button class="subsubcat-rename-btn" data-action="rename-subsubcat" data-cat="${cat.id}" data-subcat="${activeSubcatId}" data-subsubcat="${ssub.id}" title="Rename">✏️</button>
            <button class="subsubcat-delete-btn" data-action="delete-subsubcat" data-cat="${cat.id}" data-subcat="${activeSubcatId}" data-subsubcat="${ssub.id}" title="Delete">🗑️</button>
          </div>`;
        subsubList.appendChild(row);
      });
      subsubSidebar.appendChild(subsubList);

      // Add sub-subcategory button
      const addSSubRow = document.createElement('div');
      addSSubRow.className = 'subsubcat-add-row';
      const addSSubBtn = document.createElement('button');
      addSSubBtn.className      = 'subsubcat-add-btn';
      addSSubBtn.dataset.action = 'add-subsubcat';
      addSSubBtn.dataset.cat    = cat.id;
      addSSubBtn.dataset.subcat = activeSubcatId;
      addSSubBtn.textContent    = '+ Add Sub-Subcategory';
      addSSubRow.appendChild(addSSubBtn);
      subsubSidebar.appendChild(addSSubRow);

      panel.appendChild(subsubSidebar);
    }

    // ── Right: Task content area ──
    const content = document.createElement('div');
    content.className = 'subcat-content';

    if (subcats.length === 0) {
      content.innerHTML = `
        <div class="subcat-empty-prompt">
          <div class="icon">📂</div>
          <strong>No subcategories yet</strong>
          <span>Add a subcategory on the left to start tracking tasks.</span>
        </div>`;
    } else if (activeSubcatId === null) {
      content.innerHTML = `
        <div class="subcat-empty-prompt">
          <div class="icon">👈</div>
          <span>Select a subcategory to view its tasks.</span>
        </div>`;
    } else {
      const activeSub    = subcats.find(s => s.id === activeSubcatId);
      const visibleTasks = activeSubSubcatId !== null
        ? cat.tasks.filter(t => t.subcatId === activeSubcatId && t.subsubcatId === activeSubSubcatId)
        : cat.tasks.filter(t => t.subcatId === activeSubcatId);

      const taskListDiv = document.createElement('div');
      taskListDiv.className = 'task-list';
      taskListDiv.id        = `tasks-${cat.id}`;
      taskListDiv.innerHTML = visibleTasks.map(t => taskRowHTML(cat.id, t)).join('');

      // Add task row
      const addRow = document.createElement('div');
      addRow.className = 'add-task-row';
      const addPlaceholder = activeSubSubcatId !== null
        ? `Add a task to ${esc((activeSub.subsubcategories || []).find(ss => ss.id === activeSubSubcatId)?.name || activeSub.name)}…`
        : `Add a task to ${esc(activeSub.name)}…`;
      addRow.innerHTML = `
        <input class="add-task-input" id="new-task-${cat.id}"
          placeholder="${addPlaceholder}" maxlength="120"
          data-catid="${cat.id}" data-subcatid="${activeSubcatId}" data-subsubcatid="${activeSubSubcatId !== null ? activeSubSubcatId : ''}" />
        <button class="btn btn-primary btn-sm" data-action="add-task" data-cat="${cat.id}">Add</button>`;
      taskListDiv.appendChild(addRow);
      content.appendChild(taskListDiv);
    }

    panel.appendChild(content);
    list.appendChild(panel);
    updateStats();
  }

  function priorityInfo(key) { return PRIORITIES.find(p => p.key === key) || null; }

  function prioritySelectHTML(catId, taskId, currentPriority) {
    const cls = currentPriority ? `priority-${currentPriority}` : 'priority-none';
    const opts = `<option value="">— Priority —</option>` +
      PRIORITIES.map(p => `<option value="${p.key}"${p.key === currentPriority ? ' selected' : ''}>${p.dot} ${p.label}</option>`).join('');
    return `<select class="priority-select ${cls}" data-action="set-priority" data-cat="${catId}" data-task="${taskId}">${opts}</select>`;
  }

  function taskRowHTML(catId, t) {
    const si       = statusInfo(t.status);
    const hasNotes = t.notes && t.notes.trim() !== '' && t.notes !== '<br>';
    return `
      <div class="task-row" id="task-row-${t.id}">
        <div class="task-check ${t.status === 'done' ? 'done' : ''}"
          data-action="quick-toggle" data-cat="${catId}" data-task="${t.id}" title="Toggle done"></div>
        <button class="task-link ${t.status === 'done' ? 'done' : ''} ${hasNotes ? 'has-notes' : ''}"
          id="task-name-${t.id}"
          data-action="open-task-editor" data-cat="${catId}" data-task="${t.id}"
          title="Click to edit task">${esc(t.name)}</button>
        ${prioritySelectHTML(catId, t.id, t.priority || null)}
        <button class="status-badge ${si.cls}"
          data-action="open-status" data-cat="${catId}" data-task="${t.id}">${si.label}</button>
        <div class="task-actions">
          <button class="btn-icon" data-action="delete-task" data-cat="${catId}" data-task="${t.id}" title="Delete">🗑️</button>
        </div>
      </div>`;
  }

  function updateStats() {
    const allTasks = categories.flatMap(c => c.tasks);
    const done = allTasks.filter(t => t.status === 'done').length;
    document.getElementById('stat-cats').textContent  = categories.length;
    document.getElementById('stat-tasks').textContent = allTasks.length;
    document.getElementById('stat-done').textContent  = done;
    document.getElementById('stat-pct').textContent   = allTasks.length
      ? Math.round(done / allTasks.length * 100) + '%' : '0%';
  }

  // ── Event delegation ──────────────────────────────────────────────────────
  // ── Priority change handler ────────────────────────────────────────────────
  document.addEventListener('change', e => {
    const el = e.target.closest('[data-action="set-priority"]');
    if (!el) return;
    const catId  = parseInt(el.dataset.cat);
    const taskId = parseInt(el.dataset.task);
    const cat    = categories.find(c => c.id === catId);
    const task   = cat && cat.tasks.find(t => t.id === taskId);
    if (!task) return;
    task.priority = el.value || null;
    // Update select styling in-place
    el.className = `priority-select ${task.priority ? 'priority-' + task.priority : 'priority-none'}`;
    saveData();
    // If we're on the TIP panel, re-render to re-sort groups
    if (activeCatId === TIP_TAB_ID) render();
  });

  document.addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action  = el.dataset.action;
    const catId   = el.dataset.cat === TIP_TAB_ID ? TIP_TAB_ID : parseInt(el.dataset.cat);
    const taskId  = parseInt(el.dataset.task);

    if (action === 'select-tab')      { selectTab(el.dataset.cat); }
    if (action === 'toggle-tip-group') {
      const gid = parseInt(el.dataset.cat);
      if (tipCollapsedGroups.has(gid)) {
        tipCollapsedGroups.delete(gid);
      } else {
        tipCollapsedGroups.add(gid);
      }
      el.classList.toggle('collapsed');
      const tasksWrap = el.nextElementSibling;
      if (tasksWrap) tasksWrap.classList.toggle('collapsed');
      return;
    }
    if (action === 'toggle-tip-priority-group') {
      const priKey = el.dataset.prikey;
      if (tipCollapsedPriorityGroups.has(priKey)) {
        tipCollapsedPriorityGroups.delete(priKey);
      } else {
        tipCollapsedPriorityGroups.add(priKey);
      }
      el.classList.toggle('collapsed');
      const tasksWrap = el.nextElementSibling;
      if (tasksWrap) tasksWrap.classList.toggle('collapsed');
      return;
    }
    if (action === 'select-subcat')   { selectSubcat(catId, el.dataset.subcat); }
    if (action === 'add-subcat')      { addSubcategory(catId); }
    if (action === 'rename-subcat')   { renameSubcategory(catId, parseInt(el.dataset.subcat)); }
    if (action === 'delete-subcat')   { deleteSubcategory(catId, parseInt(el.dataset.subcat)); }
    if (action === 'select-subsubcat') {
      const ssubVal = el.dataset.subsubcat;
      activeCatId = catId;
      activeSubcatId = parseInt(el.dataset.subcat);
      activeSubSubcatId = ssubVal === '' ? null : parseInt(ssubVal);
      render();
    }
    if (action === 'add-subsubcat')    { addSubSubcategory(catId, parseInt(el.dataset.subcat)); }
    if (action === 'rename-subsubcat') { renameSubSubcategory(catId, parseInt(el.dataset.subcat), parseInt(el.dataset.subsubcat)); }
    if (action === 'delete-subsubcat') { deleteSubSubcategory(catId, parseInt(el.dataset.subcat), parseInt(el.dataset.subsubcat)); }
    if (action === 'add-task')        { addTask(catId); }
    if (action === 'quick-toggle') { quickToggle(catId, taskId); }
    if (action === 'open-status')  { openStatusMenu(e, catId, taskId); }
    if (action === 'edit-task')    { editTaskName(catId, taskId); }
    if (action === 'delete-task')  { deleteTask(catId, taskId); }
    if (action === 'open-notes')   { openNotesModal(catId, taskId); }
    if (action === 'open-task-editor') { openTaskEditor(catId, taskId); }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.classList.contains('add-task-input')) {
      addTask(parseInt(e.target.dataset.catid));
    }
    if (e.key === 'Escape') {
      closeTaskEditor(true);
      closeNotesModal(true);
    }
  });

  // ── Category ops ──────────────────────────────────────────────────────────

  function selectTab(id) {
    activeCatId    = id === TIP_TAB_ID ? TIP_TAB_ID : parseInt(id);
    activeSubcatId = null;
    activeSubSubcatId = null;
    render();
  }

  function selectSubcat(catId, subcatId) {
    activeCatId    = catId;
    activeSubcatId = subcatId === '' ? null : parseInt(subcatId);
    activeSubSubcatId = null;
    render();
  }

  function addSubcategory(catId) {
    const name = prompt('Enter subcategory name:');
    if (!name || !name.trim()) return;
    const cat = categories.find(c => c.id === catId);
    if (!cat.subcategories) cat.subcategories = [];
    const newSub = { id: nextSubcatId++, name: name.trim() };
    cat.subcategories.push(newSub);
    activeSubcatId = newSub.id;
    render(); saveData();
  }

  function renameSubcategory(catId, subcatId) {
    const cat = categories.find(c => c.id === catId);
    const sub = cat.subcategories.find(s => s.id === subcatId);
    const name = prompt('Rename subcategory:', sub.name);
    if (!name || !name.trim()) return;
    sub.name = name.trim();
    render(); saveData();
  }

  function deleteSubcategory(catId, subcatId) {
    if (!confirm('Delete this subcategory and all its tasks?')) return;
    const cat = categories.find(c => c.id === catId);
    cat.subcategories = cat.subcategories.filter(s => s.id !== subcatId);
    cat.tasks = cat.tasks.filter(t => t.subcatId !== subcatId);
    if (activeSubcatId === subcatId) {
      activeSubcatId = cat.subcategories.length ? cat.subcategories[0].id : null;
      activeSubSubcatId = null;
    }
    render(); saveData();
  }

  function addSubSubcategory(catId, subcatId) {
    const name = prompt('Enter sub-subcategory name:');
    if (!name || !name.trim()) return;
    const cat = categories.find(c => c.id === catId);
    const sub = (cat.subcategories || []).find(s => s.id === subcatId);
    if (!sub) return;
    if (!sub.subsubcategories) sub.subsubcategories = [];
    const newSSub = { id: nextSubSubcatId++, name: name.trim() };
    sub.subsubcategories.push(newSSub);
    activeSubSubcatId = newSSub.id;
    render(); saveData();
  }

  function renameSubSubcategory(catId, subcatId, subsubcatId) {
    const cat  = categories.find(c => c.id === catId);
    const sub  = (cat.subcategories || []).find(s => s.id === subcatId);
    const ssub = (sub.subsubcategories || []).find(ss => ss.id === subsubcatId);
    const name = prompt('Rename sub-subcategory:', ssub.name);
    if (!name || !name.trim()) return;
    ssub.name = name.trim();
    render(); saveData();
  }

  function deleteSubSubcategory(catId, subcatId, subsubcatId) {
    if (!confirm('Delete this sub-subcategory and all its tasks?')) return;
    const cat = categories.find(c => c.id === catId);
    const sub = (cat.subcategories || []).find(s => s.id === subcatId);
    sub.subsubcategories = (sub.subsubcategories || []).filter(ss => ss.id !== subsubcatId);
    cat.tasks = cat.tasks.filter(t => !(t.subcatId === subcatId && t.subsubcatId === subsubcatId));
    if (activeSubSubcatId === subsubcatId) {
      activeSubSubcatId = null;
    }
    render(); saveData();
  }

  function deleteCategory(id) {
    if (!confirm('Delete this category and all its tasks?')) return;
    categories = categories.filter(c => c.id !== id);
    if (activeCatId === id) {
      activeCatId = categories.length ? categories[0].id : null;
    }
    render(); saveData();
  }

  function editCatName(id) {
    const cat  = categories.find(c => c.id === id);
    const span = document.getElementById(`cat-name-${id}`);
    const inp  = document.createElement('input');
    inp.className = 'cat-name-input';
    inp.value = cat.name;
    span.replaceWith(inp);
    inp.focus(); inp.select();
    const save = () => {
      const v = inp.value.trim();
      if (v) cat.name = v;
      render(); saveData();
    };
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { inp.value = cat.name; inp.blur(); }
    });
  }

  // ── Task ops ──────────────────────────────────────────────────────────────
  function addTask(catId) {
    const inp     = document.getElementById(`new-task-${catId}`);
    const name    = inp.value.trim();
    if (!name) { inp.focus(); return; }
    const cat     = categories.find(c => c.id === catId);
    const subcatId    = inp.dataset.subcatid    ? parseInt(inp.dataset.subcatid)    : null;
    const subsubcatId = inp.dataset.subsubcatid ? parseInt(inp.dataset.subsubcatid) : null;
    cat.tasks.push({ id: nextTaskId++, name, status: 'not-started', notes: '', subcatId: subcatId || null, subsubcatId: subsubcatId || null, priority: 'medium' });
    inp.value = '';
    render(); saveData();
    const el = document.getElementById(`new-task-${catId}`);
    if (el) el.focus();
  }

  function deleteTask(catId, taskId) {
    const cat = categories.find(c => c.id === catId);
    cat.tasks = cat.tasks.filter(t => t.id !== taskId);
    render(); saveData();
  }

  function quickToggle(catId, taskId) {
    const cat  = categories.find(c => c.id === catId);
    const task = cat.tasks.find(t => t.id === taskId);
    task.status = task.status === 'done' ? 'not-started' : 'done';
    render(); saveData();
  }

  function editTaskName(catId, taskId) {
    const cat  = categories.find(c => c.id === catId);
    const task = cat.tasks.find(t => t.id === taskId);
    const span = document.getElementById(`task-name-${taskId}`);
    const inp  = document.createElement('input');
    inp.className = 'task-name-input';
    inp.value = task.name;
    span.replaceWith(inp);
    inp.focus(); inp.select();
    const save = () => {
      const v = inp.value.trim();
      if (v) task.name = v;
      render(); saveData();
    };
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { inp.value = task.name; inp.blur(); }
    });
  }

  // ── Status menu ───────────────────────────────────────────────────────────
  let _menuCatId = null, _menuTaskId = null;

  function openStatusMenu(e, catId, taskId) {
    e.stopPropagation();
    _menuCatId = catId; _menuTaskId = taskId;
    const menu = document.getElementById('status-menu');
    menu.innerHTML = STATUSES.map(s =>
      `<button data-action="set-status" data-key="${s.key}" class="${s.cls}">${s.label}</button>`
    ).join('');
    const rect = e.target.getBoundingClientRect();
    menu.style.display = 'block';
    menu.style.top  = (rect.bottom + 6) + 'px';
    menu.style.left = rect.left + 'px';
    document.getElementById('overlay').classList.add('visible');
  }

  document.getElementById('status-menu').addEventListener('click', e => {
    const btn = e.target.closest('[data-action="set-status"]');
    if (!btn) return;
    const cat  = categories.find(c => c.id === _menuCatId);
    const task = cat.tasks.find(t => t.id === _menuTaskId);
    task.status = btn.dataset.key;
    closeStatusMenu();
    render(); saveData();
  });

  function closeStatusMenu() {
    document.getElementById('status-menu').style.display = 'none';
    document.getElementById('overlay').classList.remove('visible');
    _menuCatId = _menuTaskId = null;
  }

  document.getElementById('overlay').addEventListener('click', closeStatusMenu);

  // ── Task Editor Modal (name + notes combined) ────────────────────────────
  const taskEditorBackdrop = document.getElementById('task-editor-backdrop');
  const taskEditorNameInput = document.getElementById('task-editor-name');
  const taskEditorNotes    = document.getElementById('task-editor-notes');
  const taskEditorCount    = document.getElementById('task-editor-char-count');
  let _editorCatId  = null;
  let _editorTaskId = null;

  function openTaskEditor(catId, taskId) {
    const cat  = categories.find(c => c.id === catId);
    const task = cat && cat.tasks.find(t => t.id === taskId);
    if (!task) return;
    _editorCatId  = catId;
    _editorTaskId = taskId;

    taskEditorNameInput.value  = task.name;
    taskEditorNotes.innerHTML  = task.notes || '';
    updateTaskEditorCount();

    taskEditorBackdrop.classList.add('visible');
    setTimeout(() => taskEditorNameInput.select(), 80);
  }

  function saveTaskEditor() {
    if (_editorCatId == null || _editorTaskId == null) return;
    const cat  = categories.find(c => c.id === _editorCatId);
    const task = cat && cat.tasks.find(t => t.id === _editorTaskId);
    if (!task) return;
    const newName = taskEditorNameInput.value.trim();
    if (newName) task.name = newName;
    task.notes = taskEditorNotes.innerHTML;
    saveData();
  }

  function closeTaskEditor(save = true) {
    if (!taskEditorBackdrop.classList.contains('visible')) return;
    if (save) saveTaskEditor();
    taskEditorBackdrop.classList.remove('visible');
    _editorCatId = _editorTaskId = null;
    render();
  }

  function updateTaskEditorCount() {
    const text = taskEditorNotes.innerText || '';
    taskEditorCount.textContent = `${text.length} characters`;
  }

  // Save & Close
  document.getElementById('task-editor-save-btn').addEventListener('click', () => closeTaskEditor(true));
  // X button
  document.getElementById('task-editor-close').addEventListener('click', () => closeTaskEditor(true));
  // Click outside
  taskEditorBackdrop.addEventListener('click', e => {
    if (e.target === taskEditorBackdrop) closeTaskEditor(true);
  });
  // Clear notes
  document.getElementById('task-editor-clear-btn').addEventListener('click', () => {
    if (!confirm('Clear all notes for this task?')) return;
    taskEditorNotes.innerHTML = '';
    updateTaskEditorCount();
  });
  // Character count
  taskEditorNotes.addEventListener('input', updateTaskEditorCount);
  // Save on Enter in name field (moves focus to notes)
  taskEditorNameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); taskEditorNotes.focus(); }
  });

  // Formatting toolbar for task editor
  document.getElementById('task-editor-toolbar').addEventListener('mousedown', e => {
    const btn = e.target.closest('.toolbar-btn');
    if (!btn) return;
    e.preventDefault();
    const cmd = btn.dataset.cmd;
    const val = btn.dataset.val || null;
    // Direct commands to the task-editor-notes div
    taskEditorNotes.focus();
    document.execCommand(cmd, false, val);
    updateTaskEditorCount();
  });

  // Toolbar active state
  document.addEventListener('selectionchange', () => {
    if (!taskEditorBackdrop.classList.contains('visible')) return;
    document.querySelectorAll('#task-editor-toolbar .toolbar-btn[data-cmd]').forEach(btn => {
      const cmd = btn.dataset.cmd;
      if (['bold','italic','underline','strikeThrough',
           'insertUnorderedList','insertOrderedList'].includes(cmd)) {
        btn.classList.toggle('active', document.queryCommandState(cmd));
      }
    });
  });

  // ── Notes Modal ───────────────────────────────────────────────────────────
  const notesBackdrop = document.getElementById('notes-modal-backdrop');
  const notesEditor   = document.getElementById('notes-editor');
  const notesTitle    = document.getElementById('notes-modal-title');
  const notesCount    = document.getElementById('notes-char-count');

  function openNotesModal(catId, taskId) {
    const cat  = categories.find(c => c.id === catId);
    const task = cat.tasks.find(t => t.id === taskId);
    _notesCatId  = catId;
    _notesTaskId = taskId;

    notesTitle.innerHTML = `<span>Notes —</span> ${esc(task.name)}`;
    notesEditor.innerHTML = task.notes || '';
    updateCharCount();

    notesBackdrop.classList.add('visible');
    // Focus editor after animation
    setTimeout(() => notesEditor.focus(), 180);
  }

  function saveNotes() {
    if (_notesCatId == null || _notesTaskId == null) return;
    const cat  = categories.find(c => c.id === _notesCatId);
    const task = cat?.tasks.find(t => t.id === _notesTaskId);
    if (task) {
      task.notes = notesEditor.innerHTML;
      saveData();
      // Update the notes button indicator in place without full re-render
      const btn = document.querySelector(
        `[data-action="open-notes"][data-cat="${_notesCatId}"][data-task="${_notesTaskId}"]`
      );
      if (btn) {
        const hasNotes = task.notes && task.notes.trim() !== '' && task.notes !== '<br>';
        btn.classList.toggle('has-notes', hasNotes);
        btn.title = hasNotes ? 'View/Edit Notes' : 'Add Notes';
      }
    }
  }

  function closeNotesModal(save = true) {
    if (!notesBackdrop.classList.contains('visible')) return;
    if (save) saveNotes();
    notesBackdrop.classList.remove('visible');
    _notesCatId = _notesTaskId = null;
  }

  function updateCharCount() {
    const text = notesEditor.innerText || '';
    const len  = text.replace(/\s+/g, '').length; // count non-whitespace chars
    notesCount.textContent = `${text.length} characters`;
  }

  // Save & Close button
  document.getElementById('notes-save-btn').addEventListener('click', () => closeNotesModal(true));

  // Close (X) button — also saves
  document.getElementById('notes-modal-close').addEventListener('click', () => closeNotesModal(true));

  // Click outside modal to close (saves)
  notesBackdrop.addEventListener('click', e => {
    if (e.target === notesBackdrop) closeNotesModal(true);
  });

  // Clear notes button
  document.getElementById('notes-clear-btn').addEventListener('click', () => {
    if (!confirm('Clear all notes for this task?')) return;
    notesEditor.innerHTML = '';
    updateCharCount();
  });

  // Character count update
  notesEditor.addEventListener('input', updateCharCount);

  // ── Formatting toolbar ────────────────────────────────────────────────────
  document.getElementById('notes-toolbar').addEventListener('mousedown', e => {
    const btn = e.target.closest('.toolbar-btn');
    if (!btn) return;
    e.preventDefault(); // keep editor focus
    const cmd = btn.dataset.cmd;
    const val = btn.dataset.val || null;
    document.execCommand(cmd, false, val);
    notesEditor.focus();
    updateCharCount();
  });

  // Toolbar active state on selection change
  document.addEventListener('selectionchange', () => {
    if (!notesBackdrop.classList.contains('visible')) return;
    document.querySelectorAll('.toolbar-btn[data-cmd]').forEach(btn => {
      const cmd = btn.dataset.cmd;
      if (['bold','italic','underline','strikeThrough',
           'insertUnorderedList','insertOrderedList'].includes(cmd)) {
        btn.classList.toggle('active', document.queryCommandState(cmd));
      }
    });
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
