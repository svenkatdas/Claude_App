<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #eef2ff;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --green: #22c55e;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --gray: #94a3b8;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Loading screen ── */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      font-size: 1rem; color: var(--muted);
      flex-direction: column; gap: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth screen ── */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: none;
      align-items: center; justify-content: center;
      z-index: 998;
    }
    .auth-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 36px 32px;
      width: 100%; max-width: 380px;
    }
    .auth-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .auth-card h2 span { color: var(--accent); }
    .auth-card p { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label {
      display: block; font-size: 0.82rem; font-weight: 600;
      margin-bottom: 5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px;
    }
    .auth-field input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 0.93rem; outline: none; background: var(--bg);
      transition: border-color 0.15s;
    }
    .auth-field input:focus { border-color: var(--accent); background: var(--surface); }
    .auth-error {
      color: var(--danger); font-size: 0.83rem;
      margin-bottom: 12px; min-height: 18px;
      background: var(--danger-light); border-radius: 6px;
      padding: 0; transition: padding 0.15s;
    }
    .auth-error:not(:empty) { padding: 8px 12px; }
    .btn-full { width: 100%; padding: 11px; font-size: 0.95rem; }
    .auth-switch {
      text-align: center; font-size: 0.85rem;
      color: var(--muted); margin-top: 18px;
    }
    .auth-switch a {
      color: var(--accent); cursor: pointer;
      font-weight: 600; text-decoration: none;
    }
    .auth-switch a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: #0a2463;
      border-bottom: 1px solid #071a4a;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; color: #ffffff; }
    header h1 span { color: #7eb8f7; }
    .header-right { display: flex; align-items: center; gap: 24px; }
    .header-stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat .num { font-size: 1.3rem; font-weight: 700; color: #ffffff; }
    .stat .lbl { font-size: 0.7rem; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 0.5px; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-email {
      font-size: 0.83rem; color: rgba(255,255,255,0.75);
      max-width: 180px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Main layout ── */
    main { width: 100%; padding: 20px 20px 0; }

    /* ── Full-width menu section (outside main's max-width constraint) ── */
    #cat-menu-section {
      width: 100%;
      padding: 20px 20px 0;
      box-sizing: border-box;
    }

    /* ── Category menu spacing ── */

    /* ── Horizontal Category Menu ── */
    .cat-menu-wrap {
      display: flex;
      align-items: stretch;
      gap: 8px;
      background: transparent;
      border: none;
      border-radius: 0;
      overflow: visible;
      box-shadow: none;
      margin-bottom: 0;
      flex-wrap: wrap;
    }
    .cat-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 14px 14px 12px;
      border: none;
      border-right: none;
      background: #1e3a5f;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s, box-shadow 0.15s;
      position: relative;
      min-width: 0;
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(10,36,99,0.18);
    }
    .cat-tab:last-child { border-right: none; }
    .cat-tab:hover {
      background: #254a7a;
      box-shadow: 0 4px 14px rgba(30,58,95,0.35);
    }
    .cat-tab:active { transform: translateY(0); }
    .cat-tab.active {
      background: #2d5a9e;
      color: #fff;
      box-shadow: 0 4px 16px rgba(30,58,95,0.45);
    }
    .cat-tab-name {
      font-weight: 700;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
      color: rgba(255,255,255,0.85);
    }
    .cat-tab.active .cat-tab-name { color: #fff; }
    .cat-tab-meta {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cat-tab.active .cat-tab-meta { color: rgba(255,255,255,0.8); }
    .cat-tab-pct {
      font-size: 0.7rem;
      font-weight: 600;
    }
    .cat-tab-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .cat-tab.active .cat-tab-bar { background: rgba(255,255,255,0.25); }
    .cat-tab-progress {
      height: 100%;
      background: #7eb8f7;
      border-radius: 2px;
      transition: width 0.35s;
    }
    .cat-tab.active .cat-tab-progress { background: #fff; }

    /* ── Tasks in Progress special tab ── */
    .cat-tab.tip-tab { background: #6b3a1f; }
    .cat-tab.tip-tab:hover { background: #7d4525; box-shadow: 0 4px 14px rgba(107,58,31,0.40); }
    .cat-tab.tip-tab.active { background: #8b4513; box-shadow: 0 4px 16px rgba(107,58,31,0.5); }
    .cat-tab.tip-tab .cat-tab-name { color: #a8c4f0; }

    /* ── Progress-based button colors ── */
    /* < 50% done → dark blue */
    .cat-tab.pct-low {
      background: #1e3a5f;
      box-shadow: 0 2px 8px rgba(30,58,95,0.30);
    }
    .cat-tab.pct-low:hover {
      background: #254a7a;
      box-shadow: 0 4px 14px rgba(30,58,95,0.40);
    }
    .cat-tab.pct-low.active {
      background: #2d5a9e;
      box-shadow: 0 4px 16px rgba(30,58,95,0.50);
    }

    /* ≥ 50% and < 100% done → dark blue */
    .cat-tab.pct-mid {
      background: #1e3a5f;
      box-shadow: 0 2px 8px rgba(30,58,95,0.30);
    }
    .cat-tab.pct-mid:hover {
      background: #254a7a;
      box-shadow: 0 4px 14px rgba(30,58,95,0.40);
    }
    .cat-tab.pct-mid.active {
      background: #2d5a9e;
      box-shadow: 0 4px 16px rgba(30,58,95,0.50);
    }
    .cat-tab.pct-mid .cat-tab-name        { color: rgba(255,255,255,0.9); }
    .cat-tab.pct-mid .cat-tab-meta        { color: rgba(255,255,255,0.65); }
    .cat-tab.pct-mid.active .cat-tab-name { color: #fff; }
    .cat-tab.pct-mid.active .cat-tab-meta { color: rgba(255,255,255,0.85); }

    /* 100% done → dark blue */
    .cat-tab.pct-done {
      background: #1e3a5f;
      box-shadow: 0 2px 8px rgba(30,58,95,0.35);
    }
    .cat-tab.pct-done:hover {
      background: #254a7a;
      box-shadow: 0 4px 14px rgba(30,58,95,0.45);
    }
    .cat-tab.pct-done.active {
      background: #2d5a9e;
      box-shadow: 0 4px 16px rgba(30,58,95,0.55);
    }
    .cat-tab.tip-tab.active .cat-tab-name { color: #fff; }
    .cat-tab.tip-tab .cat-tab-meta { color: rgba(168,196,240,0.7); }
    .cat-tab.tip-tab.active .cat-tab-meta { color: rgba(255,255,255,0.8); }
    .cat-tab.tip-tab .cat-tab-bar { background: rgba(255,255,255,0.12); }
    .cat-tab.tip-tab.active .cat-tab-bar { background: rgba(255,255,255,0.25); }
    .cat-tab.tip-tab .cat-tab-progress { background: #7eb8f7; }
    .cat-tab.tip-tab.active .cat-tab-progress { background: #fff; }

    /* ── Tasks in Progress panel ── */
    .tip-panel {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .tip-header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px 12px;
      border-bottom: 1.5px solid var(--border);
      background: #fffbeb;
    }
    .tip-header-icon { font-size: 1.3rem; }
    .tip-header-title { font-size: 1rem; font-weight: 700; color: #92400e; }
    .tip-header-count {
      font-size: 0.78rem; font-weight: 700;
      background: #fde68a; color: #92400e;
      border-radius: 20px; padding: 2px 9px;
    }
    .tip-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px 20px; gap: 10px;
      color: var(--muted); font-size: 0.92rem; text-align: center;
    }
    .tip-empty .icon { font-size: 2.2rem; }
    .tip-cat-group { border-bottom: 1.5px solid var(--border); }
    .tip-cat-group:last-child { border-bottom: none; }
    .tip-cat-label {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px 10px;
      background: #f0f4ff;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .tip-cat-label:hover { background: #e0e7ff; }
    .tip-cat-label.collapsed { border-bottom: none; }
    .tip-cat-chevron {
      font-size: 0.7rem;
      color: var(--accent);
      transition: transform 0.2s ease;
      margin-left: auto;
      flex-shrink: 0;
    }
    .tip-cat-label.collapsed .tip-cat-chevron { transform: rotate(-90deg); }
    .tip-cat-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }
    .tip-cat-name {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--accent);
    }
    .tip-cat-task-count {
      font-size: 0.7rem; font-weight: 700;
      background: var(--accent-light); color: var(--accent);
      border-radius: 20px; padding: 1px 7px;
    }
    .tip-cat-tasks {
      overflow: hidden;
      max-height: 2000px;
      transition: max-height 0.3s ease, opacity 0.2s ease;
      opacity: 1;
    }
    .tip-cat-tasks.collapsed {
      max-height: 0;
      opacity: 0;
    }
    .tip-task-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .tip-task-row:last-child { border-bottom: none; }
    .tip-task-row:hover { background: #fafbff; }
    .tip-subcat-badge {
      font-size: 0.7rem; font-weight: 600;
      background: #f1f5f9; color: #475569;
      border-radius: 20px; padding: 2px 8px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Active panel ── */
    .cat-panel {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
      display: flex;
      min-height: 200px;
    }

    /* ── Subcategory sidebar (vertical) ── */
    .subcat-sidebar {
      width: 270px;
      flex-shrink: 0;
      background: #f8f9ff;
      border-right: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .subcat-sidebar-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
    }
    .subcat-list {
      flex: 1;
      overflow-y: auto;
    }
    .subcat-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .subcat-row:last-child { border-bottom: none; }
    .subcat-row:hover { background: var(--accent-light); }
    .subcat-row.active { background: var(--accent); }
    .subcat-row-btn {
      flex: 1;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 14px;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .subcat-row.active .subcat-row-btn { color: #fff; }
    .subcat-row-count {
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(0,0,0,0.07);
      border-radius: 20px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .subcat-row.active .subcat-row-count { background: rgba(255,255,255,0.25); color: #fff; }
    .subcat-row-actions {
      display: none;
      gap: 1px;
      padding-right: 6px;
    }
    .subcat-row:hover .subcat-row-actions { display: flex; }
    .subcat-row.active .subcat-row-actions { display: flex; }
    .subcat-rename-btn, .subcat-delete-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.75rem; padding: 3px 4px; border-radius: 4px;
      color: var(--muted); transition: background 0.1s, color 0.1s;
    }
    .subcat-row.active .subcat-rename-btn,
    .subcat-row.active .subcat-delete-btn { color: rgba(255,255,255,0.7); }
    .subcat-rename-btn:hover { color: var(--accent); background: var(--accent-light); }
    .subcat-delete-btn:hover { color: var(--danger); background: var(--danger-light); }
    .subcat-row.active .subcat-rename-btn:hover { color: #fff; background: rgba(255,255,255,0.2); }
    .subcat-row.active .subcat-delete-btn:hover  { color: #fca5a5; background: rgba(255,255,255,0.15); }

    .subcat-add-row {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
    }
    .subcat-add-btn {
      width: 100%;
      padding: 7px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      border: 1.5px dashed #a5b4fc;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      text-align: center;
    }
    .subcat-add-btn:hover { background: #e0e7ff; }

    /* ── Sub-Subcategory sidebar (middle column) ── */
    .subsubcat-sidebar {
      width: 286px;
      flex-shrink: 0;
      background: #f0f4ff;
      border-right: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .subsubcat-sidebar-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .subsubcat-sidebar-title span { flex: 1; }
    .subsubcat-list {
      flex: 1;
      overflow-y: auto;
    }
    /* "All" row at top of sub-subcat list */
    .subsubcat-all-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .subsubcat-all-row:hover { background: #dde5ff; }
    .subsubcat-all-row.active { background: var(--accent); }
    .subsubcat-all-btn {
      flex: 1;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 9px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .subsubcat-all-row.active .subsubcat-all-btn { color: #fff; }
    .subsubcat-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .subsubcat-row:last-child { border-bottom: none; }
    .subsubcat-row:hover { background: #dde5ff; }
    .subsubcat-row.active { background: var(--accent); }
    .subsubcat-row-btn {
      flex: 1;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 9px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .subsubcat-row.active .subsubcat-row-btn { color: #fff; }
    .subsubcat-row-count {
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(0,0,0,0.07);
      border-radius: 20px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .subsubcat-row.active .subsubcat-row-count { background: rgba(255,255,255,0.25); color: #fff; }
    .subsubcat-row-actions {
      display: none;
      gap: 1px;
      padding-right: 6px;
    }
    .subsubcat-row:hover .subsubcat-row-actions { display: flex; }
    .subsubcat-row.active .subsubcat-row-actions { display: flex; }
    .subsubcat-rename-btn, .subsubcat-delete-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.75rem; padding: 3px 4px; border-radius: 4px;
      color: var(--muted); transition: background 0.1s, color 0.1s;
    }
    .subsubcat-row.active .subsubcat-rename-btn,
    .subsubcat-row.active .subsubcat-delete-btn { color: rgba(255,255,255,0.7); }
    .subsubcat-rename-btn:hover { color: var(--accent); background: var(--accent-light); }
    .subsubcat-delete-btn:hover { color: var(--danger); background: var(--danger-light); }
    .subsubcat-row.active .subsubcat-rename-btn:hover { color: #fff; background: rgba(255,255,255,0.2); }
    .subsubcat-row.active .subsubcat-delete-btn:hover  { color: #fca5a5; background: rgba(255,255,255,0.15); }
    .subsubcat-add-row {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
    }
    .subsubcat-add-btn {
      width: 100%;
      padding: 7px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #6366f1;
      background: #e0e7ff;
      border: 1.5px dashed #a5b4fc;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      text-align: center;
    }
    .subsubcat-add-btn:hover { background: #c7d2fe; }

    /* ── Task content area ── */
    .subcat-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .subcat-empty-prompt {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      gap: 10px;
    }
    .subcat-empty-prompt .icon { font-size: 2rem; }

    /* ── Buttons ── */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-sm { padding: 6px 12px; font-size: 0.82rem; border-radius: 7px; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: var(--danger-light); color: var(--danger); border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-icon {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); padding: 4px 6px; border-radius: 6px;
      font-size: 1rem; line-height: 1; transition: background 0.12s, color 0.12s;
    }
    .btn-icon:hover { background: var(--bg); color: var(--text); }

    /* cat-name-input for inline rename in panel header */
    .cat-name-input {
      font-weight: 700; font-size: 1rem;
      border: 1.5px solid var(--accent);
      border-radius: 6px; padding: 3px 8px;
      outline: none; width: 200px;
    }

    /* ── Task list ── */
    .task-list { padding: 4px 0 8px; }

    .task-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #fafbff; }

    .task-check {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .task-check.done { border-color: var(--green); background: var(--green); }
    .task-check.done::after { content: '✓'; color: #fff; font-size: 0.65rem; font-weight: 900; }

    .task-name { flex: 1; font-size: 0.92rem; }
    .task-name.done { text-decoration: line-through; color: var(--muted); }
    .task-name-input {
      flex: 1; font-size: 0.92rem;
      border: 1.5px solid var(--accent); border-radius: 6px;
      padding: 3px 8px; outline: none;
    }

    .status-badge {
      font-size: 0.72rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      cursor: pointer; white-space: nowrap;
      border: none; transition: opacity 0.15s;
    }
    .status-badge:hover { opacity: 0.8; }
    .status-not-started { background: #f1f5f9; color: #475569; }
    .status-in-progress { background: #eff6ff; color: #2563eb; }
    .status-done        { background: #f0fdf4; color: #16a34a; }
    .status-blocked     { background: #fff7ed; color: #c2410c; }

    .task-actions { display: flex; gap: 2px; align-items: center; }

    /* ── Priority dropdown ── */
    .priority-select {
      font-size: 0.7rem; font-weight: 700;
      padding: 2px 6px; border-radius: 20px;
      border: none; cursor: pointer;
      appearance: none; -webkit-appearance: none;
      outline: none;
      white-space: nowrap; flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .priority-select:hover { opacity: 0.82; }
    .priority-critical { background: #fef2f2; color: #b91c1c; }
    .priority-high     { background: #fff7ed; color: #c2410c; }
    .priority-medium   { background: #fefce8; color: #a16207; }
    .priority-low      { background: #f0fdf4; color: #15803d; }
    .priority-none     { background: #f1f5f9; color: #64748b; }

    /* ── TIP Priority group header ── */
    .tip-priority-group { border-bottom: 1.5px solid var(--border); }
    .tip-priority-group:last-child { border-bottom: none; }
    .tip-priority-label {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .tip-priority-label:hover { opacity: 0.9; }
    .tip-priority-label.collapsed { border-bottom: none; }
    .tip-priority-chevron {
      font-size: 0.7rem; transition: transform 0.2s ease;
      margin-left: auto; flex-shrink: 0;
    }
    .tip-priority-label.collapsed .tip-priority-chevron { transform: rotate(-90deg); }
    .tip-priority-name {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tip-priority-count {
      font-size: 0.7rem; font-weight: 700;
      border-radius: 20px; padding: 1px 7px;
    }
    /* Priority group header colors */
    .tip-priority-label.pri-critical { background: #fef2f2; }
    .tip-priority-label.pri-critical:hover { background: #fee2e2; }
    .tip-priority-label.pri-critical .tip-priority-name { color: #b91c1c; }
    .tip-priority-label.pri-critical .tip-priority-count { background: #fecaca; color: #b91c1c; }
    .tip-priority-label.pri-critical .tip-priority-chevron { color: #b91c1c; }

    .tip-priority-label.pri-high { background: #fff7ed; }
    .tip-priority-label.pri-high:hover { background: #ffedd5; }
    .tip-priority-label.pri-high .tip-priority-name { color: #c2410c; }
    .tip-priority-label.pri-high .tip-priority-count { background: #fed7aa; color: #c2410c; }
    .tip-priority-label.pri-high .tip-priority-chevron { color: #c2410c; }

    .tip-priority-label.pri-medium { background: #fefce8; }
    .tip-priority-label.pri-medium:hover { background: #fef9c3; }
    .tip-priority-label.pri-medium .tip-priority-name { color: #a16207; }
    .tip-priority-label.pri-medium .tip-priority-count { background: #fde68a; color: #a16207; }
    .tip-priority-label.pri-medium .tip-priority-chevron { color: #a16207; }

    .tip-priority-label.pri-low { background: #f0fdf4; }
    .tip-priority-label.pri-low:hover { background: #dcfce7; }
    .tip-priority-label.pri-low .tip-priority-name { color: #15803d; }
    .tip-priority-label.pri-low .tip-priority-count { background: #bbf7d0; color: #15803d; }
    .tip-priority-label.pri-low .tip-priority-chevron { color: #15803d; }

    .tip-priority-label.pri-none { background: #f8fafc; }
    .tip-priority-label.pri-none:hover { background: #f1f5f9; }
    .tip-priority-label.pri-none .tip-priority-name { color: #64748b; }
    .tip-priority-label.pri-none .tip-priority-count { background: #e2e8f0; color: #64748b; }
    .tip-priority-label.pri-none .tip-priority-chevron { color: #64748b; }

    .tip-priority-tasks {
      overflow: hidden; max-height: 2000px;
      transition: max-height 0.3s ease, opacity 0.2s ease; opacity: 1;
    }
    .tip-priority-tasks.collapsed { max-height: 0; opacity: 0; }

    /* Category badge inside TIP priority groups */
    .tip-cat-badge {
      font-size: 0.68rem; font-weight: 600;
      background: #e0e7ff; color: #3730a3;
      border-radius: 20px; padding: 2px 8px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Notes button on task row ── */
    .btn-notes {
      background: transparent; border: none; cursor: pointer;
      padding: 4px 6px; border-radius: 6px;
      font-size: 0.95rem; line-height: 1;
      color: var(--muted);
      transition: background 0.12s, color 0.12s;
      position: relative;
    }
    .btn-notes:hover { background: var(--accent-light); color: var(--accent); }
    .btn-notes.has-notes { color: var(--accent); }
    .btn-notes.has-notes::after {
      content: '';
      position: absolute; top: 3px; right: 3px;
      width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
    }

    /* ── Add task row ── */
    .add-task-row {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 18px 12px;
    }
    .add-task-input {
      flex: 1; padding: 7px 12px;
      border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 0.88rem; outline: none;
      transition: border-color 0.15s;
      background: var(--surface);
    }
    .add-task-input:focus { border-color: var(--accent); }

    /* ── Status selector ── */
    .status-menu {
      position: fixed; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-md); z-index: 500;
      overflow: hidden; min-width: 150px;
    }
    .status-menu button {
      display: block; width: 100%; padding: 9px 14px;
      text-align: left; background: none; border: none;
      cursor: pointer; font-size: 0.88rem; font-weight: 500;
      transition: background 0.1s;
    }
    .status-menu button:hover { background: var(--bg); }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 0.92rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0; z-index: 400;
      display: none;
    }
    #overlay.visible { display: block; }

    /* ── Save indicator ── */
    #save-indicator {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 0.8rem; color: var(--muted);
      box-shadow: var(--shadow); opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #save-indicator.visible { opacity: 1; }

    /* ── Task name as hyperlink ── */
    .task-link {
      flex: 1;
      background: none; border: none; padding: 0;
      text-align: left; cursor: pointer;
      font-size: 0.92rem;
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 2px;
      transition: text-decoration-color 0.15s, color 0.15s;
      font-family: inherit;
      line-height: 1.4;
      white-space: normal;
      word-break: break-word;
    }
    .task-link:hover {
      text-decoration-color: var(--accent);
      color: var(--accent-hover);
    }
    .task-link.done {
      text-decoration: line-through;
      text-decoration-color: var(--muted);
      color: var(--muted);
    }
    .task-link.has-notes::after {
      content: ' 📝';
      font-size: 0.75rem;
      opacity: 0.6;
    }

    /* ── Task Editor Modal ── */
    #task-editor-backdrop {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #task-editor-backdrop.visible { display: flex; }

    #task-editor-modal {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: modal-in 0.18s ease;
    }

    /* Task editor header */
    .task-editor-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #fafbff;
      flex-shrink: 0;
    }
    .task-editor-icon { font-size: 1.2rem; }
    .task-editor-header-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted);
    }
    .task-editor-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: var(--muted); padding: 4px 8px;
      border-radius: 6px; transition: background 0.12s, color 0.12s;
      line-height: 1; margin-left: auto;
    }
    .task-editor-close:hover { background: var(--danger-light); color: var(--danger); }

    /* Task name field inside editor */
    .task-editor-name-wrap {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }
    .task-editor-name-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted); margin-bottom: 7px;
    }
    #task-editor-name {
      width: 100%; padding: 9px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 1rem; font-weight: 600;
      outline: none; background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
    }
    #task-editor-name:focus { border-color: var(--accent); background: var(--surface); }

    /* Notes section label */
    .task-editor-notes-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted);
      padding: 10px 20px 0;
      flex-shrink: 0;
    }

    /* Task editor footer */
    .task-editor-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: #fafbff;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════
       ── Notes Modal ──
    ══════════════════════════════════════════ */
    #notes-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #notes-modal-backdrop.visible { display: flex; }

    #notes-modal {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: modal-in 0.18s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Modal header */
    .notes-modal-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #fafbff;
      flex-shrink: 0;
    }
    .notes-modal-icon { font-size: 1.2rem; }
    .notes-modal-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .notes-modal-title span {
      font-weight: 400; color: var(--muted); font-size: 0.85rem;
    }
    .notes-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: var(--muted); padding: 4px 8px;
      border-radius: 6px; transition: background 0.12s, color 0.12s;
      line-height: 1;
    }
    .notes-modal-close:hover { background: var(--danger-light); color: var(--danger); }

    /* Formatting toolbar */
    .notes-toolbar {
      display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: #f8f9ff;
      flex-shrink: 0;
    }
    .toolbar-btn {
      background: none; border: none; cursor: pointer;
      padding: 5px 8px; border-radius: 6px;
      font-size: 0.88rem; font-weight: 600; line-height: 1;
      color: var(--text);
      transition: background 0.1s, color 0.1s;
      min-width: 28px; text-align: center;
    }
    .toolbar-btn:hover  { background: var(--accent-light); color: var(--accent); }
    .toolbar-btn.active { background: var(--accent-light); color: var(--accent); }
    .toolbar-sep {
      width: 1px; height: 20px; background: var(--border);
      margin: 0 4px; flex-shrink: 0;
    }
    .toolbar-btn[data-cmd="bold"]      { font-weight: 900; }
    .toolbar-btn[data-cmd="italic"]    { font-style: italic; }
    .toolbar-btn[data-cmd="underline"] { text-decoration: underline; }

    /* Editor area */
    .notes-editor-wrap {
      flex: 1; overflow-y: auto;
      padding: 0;
      min-height: 200px;
    }
    #notes-editor, #task-editor-notes {
      outline: none;
      padding: 18px 22px;
      min-height: 180px;
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text);
      caret-color: var(--accent);
    }
    #notes-editor:empty::before,
    #task-editor-notes:empty::before {
      content: 'Start typing your notes here… Use the toolbar above to format text.';
      color: var(--muted);
      pointer-events: none;
    }

    /* Formatted content styles inside editor */
    #notes-editor h1, #task-editor-notes h1 { font-size: 1.3rem; font-weight: 700; margin: 8px 0 4px; }
    #notes-editor h2, #task-editor-notes h2 { font-size: 1.1rem; font-weight: 700; margin: 8px 0 4px; color: var(--accent); }
    #notes-editor h3, #task-editor-notes h3 { font-size: 0.98rem; font-weight: 700; margin: 6px 0 4px; }
    #notes-editor p,  #task-editor-notes p  { margin: 4px 0; }
    #notes-editor ul, #notes-editor ol,
    #task-editor-notes ul, #task-editor-notes ol { padding-left: 22px; margin: 4px 0; }
    #notes-editor li, #task-editor-notes li { margin: 2px 0; }
    #notes-editor blockquote, #task-editor-notes blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 12px; margin: 6px 0;
      background: var(--accent-light); border-radius: 0 6px 6px 0;
      color: var(--muted); font-style: italic;
    }
    #notes-editor hr, #task-editor-notes hr {
      border: none; border-top: 1.5px solid var(--border);
      margin: 10px 0;
    }
    #notes-editor a, #task-editor-notes a { color: var(--accent); }
    #notes-editor strong, #task-editor-notes strong { font-weight: 700; }
    #notes-editor em,     #task-editor-notes em     { font-style: italic; }
    #notes-editor u,      #task-editor-notes u      { text-decoration: underline; }
    #notes-editor s,      #task-editor-notes s      { text-decoration: line-through; color: var(--muted); }
    #notes-editor mark,   #task-editor-notes mark   { background: #fef9c3; padding: 0 2px; border-radius: 3px; }
    #notes-editor code,   #task-editor-notes code {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.85em;
      background: #f1f5f9; padding: 1px 5px; border-radius: 4px;
      color: #be185d;
    }

    /* Modal footer */
    .notes-modal-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: #fafbff;
      flex-shrink: 0;
    }
    .notes-char-count { font-size: 0.78rem; color: var(--muted); }
    .notes-footer-actions { display: flex; gap: 8px; }
    .btn-notes-clear {
      background: var(--danger-light); color: var(--danger);
      border: 1.5px solid #fecaca; padding: 7px 14px;
      border-radius: 7px; font-size: 0.83rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-notes-clear:hover { background: #fee2e2; }
    .btn-notes-save {
      background: var(--accent); color: #fff;
      border: none; padding: 7px 18px;
      border-radius: 7px; font-size: 0.83rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-notes-save:hover { background: var(--accent-hover); }

    /* ══════════════════════════════════════════
       ── RESPONSIVE STYLES ──
    ══════════════════════════════════════════ */

    /* ── Tablet (≤768px) ── */
    @media (max-width: 768px) {
      /* Header */
      header {
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 10px;
      }
      header h1 { font-size: 1.1rem; }
      .header-right { flex-wrap: wrap; gap: 10px; width: 100%; justify-content: space-between; }
      .header-stats { gap: 12px; }
      .stat .num { font-size: 1.1rem; }
      .stat .lbl { font-size: 0.65rem; }
      .user-email { max-width: 140px; font-size: 0.78rem; }

      /* Main */
      main { padding: 12px 12px 0; }

      /* Menu section */
      #cat-menu-section { padding: 12px 12px 0; }

      /* Category tabs — wrap naturally on tablet */
      .cat-menu-wrap {
        gap: 6px;
      }
      .cat-tab {
        flex: 1 1 auto;
        min-width: 120px;
        padding: 10px 10px 8px;
      }
      .cat-tab-name { font-size: 0.8rem; max-width: 100px; }
      .cat-tab-meta { font-size: 0.65rem; }

      /* Panel */
      .cat-panel {
        flex-direction: column;
        min-height: unset;
      }

      /* Subcategory sidebar becomes a horizontal scroll bar on tablet */
      .subcat-sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1.5px solid var(--border);
        flex-direction: column;
      }
      .subcat-list {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
      }
      .subcat-row {
        flex: 0 0 auto;
        border-bottom: none;
        border-right: 1px solid var(--border);
        min-width: 110px;
      }
      .subcat-row:last-child { border-right: none; }
      .subcat-row-btn { padding: 8px 10px; font-size: 0.78rem; }
      .subcat-add-row { padding: 8px 12px; }
      .subcat-add-btn { font-size: 0.75rem; padding: 6px 8px; }
      .subcat-sidebar-title { padding: 8px 12px 6px; }

      /* Tasks */
      .task-row { padding: 8px 12px; gap: 8px; }
      .task-name { font-size: 0.88rem; }
      .status-badge { font-size: 0.68rem; padding: 2px 7px; }
      .add-task-row { padding: 8px 12px 10px; }

      /* TIP panel */
      .tip-task-row { padding: 8px 14px; gap: 8px; }
      .tip-header { padding: 12px 14px 10px; }

      /* Notes modal */
      #notes-modal { max-width: 100%; margin: 0; border-radius: 10px; }
      .notes-toolbar { padding: 6px 10px; gap: 1px; }
      .toolbar-btn { padding: 4px 6px; font-size: 0.82rem; min-width: 24px; }
      .notes-modal-footer { flex-direction: column; align-items: stretch; gap: 8px; }
      .notes-footer-actions { justify-content: flex-end; }
    }

    /* ── Mobile (≤480px) ── */
    @media (max-width: 480px) {
      /* Header — stack title and controls */
      header {
        padding: 10px 12px;
      }
      header h1 { font-size: 1rem; }
      .header-stats { gap: 8px; }
      .stat .num { font-size: 1rem; }
      .stat .lbl { font-size: 0.6rem; }

      /* Hide user email, show only sign out button */
      .user-email { display: none; }

      /* Auth card */
      .auth-card { padding: 24px 18px; }
      .auth-card h2 { font-size: 1.2rem; }

      /* Tabs — stack vertically on mobile */
      .cat-menu-wrap {
        flex-direction: column;
        flex-wrap: nowrap;
        gap: 6px;
      }
      .cat-tab {
        flex: none;
        width: 100%;
        flex-direction: row;
        justify-content: flex-start;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-right: none;
        border-bottom: none;
        min-width: 0;
      }
      .cat-tab:last-child { border-bottom: none; }
      .cat-tab-name {
        font-size: 0.88rem;
        max-width: none;
        flex: 1;
        white-space: normal;
      }
      .cat-tab-meta { font-size: 0.75rem; flex-shrink: 0; }
      .cat-tab-bar { display: none; }

      /* Subcategory tabs compact */
      .subcat-row { min-width: 90px; }
      .subcat-row-btn { font-size: 0.74rem; padding: 7px 8px; }

      /* Hide subcat actions by default on touch to avoid layout issues */
      .subcat-row-actions { display: none !important; }

      /* Task rows */
      .task-row { padding: 8px 10px; gap: 6px; flex-wrap: wrap; }
      .task-name { font-size: 0.85rem; flex-basis: calc(100% - 30px); }
      .task-actions { margin-left: auto; }
      .status-badge { font-size: 0.65rem; padding: 2px 6px; }

      /* Add task row */
      .add-task-row { flex-wrap: wrap; gap: 6px; padding: 8px 10px 10px; }
      .add-task-input { min-width: 0; }
      .add-task-row .btn { padding: 7px 12px; font-size: 0.8rem; }

      /* TIP panel */
      .tip-task-row { flex-wrap: wrap; padding: 8px 12px; }
      .tip-subcat-badge { font-size: 0.65rem; padding: 1px 6px; }

      /* Notes modal full screen on small phones */
      #notes-modal-backdrop { padding: 8px; }
      #notes-modal { max-height: 96vh; border-radius: 8px; }
      .notes-modal-header { padding: 12px 14px; }
      .notes-modal-title { font-size: 0.88rem; }
      #notes-editor { padding: 14px 14px; font-size: 0.88rem; }

      /* Panel header (category title bar) */
      .panel-header { padding: 10px 12px; flex-wrap: wrap; gap: 6px; }
      .panel-header-actions { flex-wrap: wrap; gap: 4px; }

      /* Save indicator */
      #save-indicator { bottom: 12px; right: 12px; font-size: 0.75rem; padding: 5px 11px; }
    }

    /* ── Very small (≤360px) ── */
    @media (max-width: 360px) {
      .header-stats { gap: 5px; }
      .stat .num { font-size: 0.95rem; }
    }

    /* ── Smooth scrollbar styling for horizontal scrollers ── */
    .cat-menu-wrap::-webkit-scrollbar,
    .subcat-list::-webkit-scrollbar { height: 4px; }
    .cat-menu-wrap::-webkit-scrollbar-track,
    .subcat-list::-webkit-scrollbar-track { background: transparent; }
    .cat-menu-wrap::-webkit-scrollbar-thumb,
    .subcat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    /* ── Admin Button ── */
    .btn-admin {
      background: #f59e0b;
      color: #1e293b;
      border: none;
    }
    .btn-admin:hover { background: #d97706; }
    .btn-admin.active {
      background: #fde68a;
      color: #92400e;
      border: 1.5px solid #fbbf24;
    }

    /* ── Admin View ── */
    #admin-view main {
      width: 100%;
      margin: 0;
      padding: 20px 20px 0;
    }
    #admin-panel-content {
      margin-bottom: 24px;
    }
    .admin-panel-inner {
      background: #fff8f0;
      border: 1.5px solid #fed7aa;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .admin-panel-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px;
      background: #fff3e0;
      border-bottom: 1.5px solid #fed7aa;
    }
    .admin-panel-icon { font-size: 1.2rem; }
    .admin-panel-title {
      font-size: 0.95rem; font-weight: 700; color: #92400e; flex: 1;
    }
    .admin-panel-count {
      font-size: 0.78rem; font-weight: 700;
      background: #fed7aa; color: #92400e;
      border-radius: 20px; padding: 2px 10px;
    }
    .admin-email-list { padding: 8px 0; }
    .admin-email-row {
      padding: 9px 20px;
      font-size: 0.88rem; color: var(--text);
      border-bottom: 1px solid #fde8c8;
    }
    .admin-email-row:last-child { border-bottom: none; }
    .admin-email-row:hover { background: #fff3e0; }
    .admin-empty {
      padding: 20px; text-align: center;
      color: var(--muted); font-size: 0.88rem;
    }
  </style>
</head>
