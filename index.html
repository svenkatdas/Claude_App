<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #eef2ff;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --green: #22c55e;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --gray: #94a3b8;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Loading screen ── */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      font-size: 1rem; color: var(--muted);
      flex-direction: column; gap: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth screen ── */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: none;
      align-items: center; justify-content: center;
      z-index: 998;
    }
    .auth-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 36px 32px;
      width: 100%; max-width: 380px;
    }
    .auth-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .auth-card h2 span { color: var(--accent); }
    .auth-card p { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label {
      display: block; font-size: 0.82rem; font-weight: 600;
      margin-bottom: 5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px;
    }
    .auth-field input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 0.93rem; outline: none; background: var(--bg);
      transition: border-color 0.15s;
    }
    .auth-field input:focus { border-color: var(--accent); background: var(--surface); }
    .auth-error {
      color: var(--danger); font-size: 0.83rem;
      margin-bottom: 12px; min-height: 18px;
      background: var(--danger-light); border-radius: 6px;
      padding: 0; transition: padding 0.15s;
    }
    .auth-error:not(:empty) { padding: 8px 12px; }
    .btn-full { width: 100%; padding: 11px; font-size: 0.95rem; }
    .auth-switch {
      text-align: center; font-size: 0.85rem;
      color: var(--muted); margin-top: 18px;
    }
    .auth-switch a {
      color: var(--accent); cursor: pointer;
      font-weight: 600; text-decoration: none;
    }
    .auth-switch a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 24px; }
    .header-stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat .num { font-size: 1.3rem; font-weight: 700; }
    .stat .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-email {
      font-size: 0.83rem; color: var(--muted);
      max-width: 180px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Main layout ── */
    main { max-width: 860px; margin: 0 auto; padding: 32px 20px 0; }

    /* ── Category menu spacing ── */

    /* ── Horizontal Category Menu ── */
    .cat-menu-wrap {
      display: flex;
      align-items: stretch;
      gap: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 0;
    }
    .cat-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 14px 10px 12px;
      border: none;
      border-right: 1.5px solid var(--border);
      background: #fafbff;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      position: relative;
      min-width: 0;
    }
    .cat-tab:last-child { border-right: none; }
    .cat-tab:hover { background: var(--accent-light); }
    .cat-tab.active {
      background: var(--accent);
      color: #fff;
    }
    .cat-tab-name {
      font-weight: 700;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
      color: var(--text);
    }
    .cat-tab.active .cat-tab-name { color: #fff; }
    .cat-tab-meta {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cat-tab.active .cat-tab-meta { color: rgba(255,255,255,0.75); }
    .cat-tab-pct {
      font-size: 0.7rem;
      font-weight: 600;
    }
    .cat-tab-bar {
      width: 100%;
      height: 3px;
      background: rgba(0,0,0,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .cat-tab.active .cat-tab-bar { background: rgba(255,255,255,0.3); }
    .cat-tab-progress {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.35s;
    }
    .cat-tab.active .cat-tab-progress { background: rgba(255,255,255,0.85); }

    /* ── Active panel ── */
    .cat-panel {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
      display: flex;
      min-height: 200px;
    }

    /* ── Subcategory sidebar (vertical) ── */
    .subcat-sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #f8f9ff;
      border-right: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .subcat-sidebar-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
    }
    .subcat-list {
      flex: 1;
      overflow-y: auto;
    }
    .subcat-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .subcat-row:last-child { border-bottom: none; }
    .subcat-row:hover { background: var(--accent-light); }
    .subcat-row.active {
      background: var(--accent);
    }
    .subcat-row-btn {
      flex: 1;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 14px;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .subcat-row.active .subcat-row-btn { color: #fff; }
    .subcat-row-count {
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(0,0,0,0.07);
      border-radius: 20px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .subcat-row.active .subcat-row-count { background: rgba(255,255,255,0.25); color: #fff; }
    .subcat-row-actions {
      display: none;
      gap: 1px;
      padding-right: 6px;
    }
    .subcat-row:hover .subcat-row-actions { display: flex; }
    .subcat-row.active .subcat-row-actions { display: flex; }
    .subcat-rename-btn, .subcat-delete-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.75rem; padding: 3px 4px; border-radius: 4px;
      color: var(--muted); transition: background 0.1s, color 0.1s;
    }
    .subcat-row.active .subcat-rename-btn,
    .subcat-row.active .subcat-delete-btn { color: rgba(255,255,255,0.7); }
    .subcat-rename-btn:hover { color: var(--accent); background: var(--accent-light); }
    .subcat-delete-btn:hover { color: var(--danger); background: var(--danger-light); }
    .subcat-row.active .subcat-rename-btn:hover { color: #fff; background: rgba(255,255,255,0.2); }
    .subcat-row.active .subcat-delete-btn:hover  { color: #fca5a5; background: rgba(255,255,255,0.15); }

    .subcat-add-row {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
    }
    .subcat-add-btn {
      width: 100%;
      padding: 7px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      border: 1.5px dashed #a5b4fc;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      text-align: center;
    }
    .subcat-add-btn:hover { background: #e0e7ff; }

    /* ── Task content area ── */
    .subcat-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .subcat-empty-prompt {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      gap: 10px;
    }
    .subcat-empty-prompt .icon { font-size: 2rem; }

    /* ── Buttons ── */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-sm { padding: 6px 12px; font-size: 0.82rem; border-radius: 7px; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: var(--danger-light); color: var(--danger); border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-icon {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); padding: 4px 6px; border-radius: 6px;
      font-size: 1rem; line-height: 1; transition: background 0.12s, color 0.12s;
    }
    .btn-icon:hover { background: var(--bg); color: var(--text); }

    /* cat-name-input for inline rename in panel header */
    .cat-name-input {
      font-weight: 700; font-size: 1rem;
      border: 1.5px solid var(--accent);
      border-radius: 6px; padding: 3px 8px;
      outline: none; width: 200px;
    }

    /* ── Task list ── */
    .task-list { padding: 4px 0 8px; }

    .task-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #fafbff; }

    .task-check {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .task-check.done { border-color: var(--green); background: var(--green); }
    .task-check.done::after { content: '✓'; color: #fff; font-size: 0.65rem; font-weight: 900; }

    .task-name { flex: 1; font-size: 0.92rem; }
    .task-name.done { text-decoration: line-through; color: var(--muted); }
    .task-name-input {
      flex: 1; font-size: 0.92rem;
      border: 1.5px solid var(--accent); border-radius: 6px;
      padding: 3px 8px; outline: none;
    }

    .status-badge {
      font-size: 0.72rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      cursor: pointer; white-space: nowrap;
      border: none; transition: opacity 0.15s;
    }
    .status-badge:hover { opacity: 0.8; }
    .status-not-started { background: #f1f5f9; color: #475569; }
    .status-in-progress { background: #eff6ff; color: #2563eb; }
    .status-done        { background: #f0fdf4; color: #16a34a; }
    .status-blocked     { background: #fff7ed; color: #c2410c; }

    .task-actions { display: flex; gap: 2px; align-items: center; }

    /* ── Notes button on task row ── */
    .btn-notes {
      background: transparent; border: none; cursor: pointer;
      padding: 4px 6px; border-radius: 6px;
      font-size: 0.95rem; line-height: 1;
      color: var(--muted);
      transition: background 0.12s, color 0.12s;
      position: relative;
    }
    .btn-notes:hover { background: var(--accent-light); color: var(--accent); }
    .btn-notes.has-notes { color: var(--accent); }
    .btn-notes.has-notes::after {
      content: '';
      position: absolute; top: 3px; right: 3px;
      width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
    }

    /* ── Add task row ── */
    .add-task-row {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 18px 12px;
    }
    .add-task-input {
      flex: 1; padding: 7px 12px;
      border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 0.88rem; outline: none;
      transition: border-color 0.15s;
      background: var(--surface);
    }
    .add-task-input:focus { border-color: var(--accent); }

    /* ── Status selector ── */
    .status-menu {
      position: fixed; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-md); z-index: 500;
      overflow: hidden; min-width: 150px;
    }
    .status-menu button {
      display: block; width: 100%; padding: 9px 14px;
      text-align: left; background: none; border: none;
      cursor: pointer; font-size: 0.88rem; font-weight: 500;
      transition: background 0.1s;
    }
    .status-menu button:hover { background: var(--bg); }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 0.92rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0; z-index: 400;
      display: none;
    }
    #overlay.visible { display: block; }

    /* ── Save indicator ── */
    #save-indicator {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 0.8rem; color: var(--muted);
      box-shadow: var(--shadow); opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #save-indicator.visible { opacity: 1; }

    /* ══════════════════════════════════════════
       ── Notes Modal ──
    ══════════════════════════════════════════ */
    #notes-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #notes-modal-backdrop.visible { display: flex; }

    #notes-modal {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: modal-in 0.18s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Modal header */
    .notes-modal-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #fafbff;
      flex-shrink: 0;
    }
    .notes-modal-icon { font-size: 1.2rem; }
    .notes-modal-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .notes-modal-title span {
      font-weight: 400; color: var(--muted); font-size: 0.85rem;
    }
    .notes-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: var(--muted); padding: 4px 8px;
      border-radius: 6px; transition: background 0.12s, color 0.12s;
      line-height: 1;
    }
    .notes-modal-close:hover { background: var(--danger-light); color: var(--danger); }

    /* Formatting toolbar */
    .notes-toolbar {
      display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: #f8f9ff;
      flex-shrink: 0;
    }
    .toolbar-btn {
      background: none; border: none; cursor: pointer;
      padding: 5px 8px; border-radius: 6px;
      font-size: 0.88rem; font-weight: 600; line-height: 1;
      color: var(--text);
      transition: background 0.1s, color 0.1s;
      min-width: 28px; text-align: center;
    }
    .toolbar-btn:hover  { background: var(--accent-light); color: var(--accent); }
    .toolbar-btn.active { background: var(--accent-light); color: var(--accent); }
    .toolbar-sep {
      width: 1px; height: 20px; background: var(--border);
      margin: 0 4px; flex-shrink: 0;
    }
    .toolbar-btn[data-cmd="bold"]      { font-weight: 900; }
    .toolbar-btn[data-cmd="italic"]    { font-style: italic; }
    .toolbar-btn[data-cmd="underline"] { text-decoration: underline; }

    /* Editor area */
    .notes-editor-wrap {
      flex: 1; overflow-y: auto;
      padding: 0;
      min-height: 200px;
    }
    #notes-editor {
      outline: none;
      padding: 18px 22px;
      min-height: 220px;
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text);
      caret-color: var(--accent);
    }
    #notes-editor:empty::before {
      content: 'Start typing your notes here… Use the toolbar above to format text.';
      color: var(--muted);
      pointer-events: none;
    }

    /* Formatted content styles inside editor */
    #notes-editor h1 { font-size: 1.3rem; font-weight: 700; margin: 8px 0 4px; }
    #notes-editor h2 { font-size: 1.1rem; font-weight: 700; margin: 8px 0 4px; color: var(--accent); }
    #notes-editor h3 { font-size: 0.98rem; font-weight: 700; margin: 6px 0 4px; }
    #notes-editor p  { margin: 4px 0; }
    #notes-editor ul, #notes-editor ol { padding-left: 22px; margin: 4px 0; }
    #notes-editor li { margin: 2px 0; }
    #notes-editor blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 12px; margin: 6px 0;
      background: var(--accent-light); border-radius: 0 6px 6px 0;
      color: var(--muted); font-style: italic;
    }
    #notes-editor hr {
      border: none; border-top: 1.5px solid var(--border);
      margin: 10px 0;
    }
    #notes-editor a { color: var(--accent); }
    #notes-editor strong { font-weight: 700; }
    #notes-editor em     { font-style: italic; }
    #notes-editor u      { text-decoration: underline; }
    #notes-editor s      { text-decoration: line-through; color: var(--muted); }
    #notes-editor mark   { background: #fef9c3; padding: 0 2px; border-radius: 3px; }
    #notes-editor code {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.85em;
      background: #f1f5f9; padding: 1px 5px; border-radius: 4px;
      color: #be185d;
    }

    /* Modal footer */
    .notes-modal-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: #fafbff;
      flex-shrink: 0;
    }
    .notes-char-count { font-size: 0.78rem; color: var(--muted); }
    .notes-footer-actions { display: flex; gap: 8px; }
    .btn-notes-clear {
      background: var(--danger-light); color: var(--danger);
      border: 1.5px solid #fecaca; padding: 7px 14px;
      border-radius: 7px; font-size: 0.83rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-notes-clear:hover { background: #fee2e2; }
    .btn-notes-save {
      background: var(--accent); color: #fff;
      border: none; padding: 7px 18px;
      border-radius: 7px; font-size: 0.83rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-notes-save:hover { background: var(--accent-hover); }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="spinner"></div>
  Loading…
</div>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-card">
    <h2>Project <span>Tracker</span></h2>
    <p id="auth-subtitle">Sign in to your account</p>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="btn btn-primary btn-full" id="auth-submit-btn">Sign In</button>
    <div class="auth-switch">
      <span id="auth-switch-text">Don't have an account?</span>
      <a id="auth-switch-link"> Sign Up</a>
    </div>
  </div>
</div>

<!-- App -->
<header>
  <h1>Project <span>Tracker</span></h1>
  <div class="header-right">
    <div class="header-stats">
      <div class="stat"><div class="num" id="stat-cats">0</div><div class="lbl">Categories</div></div>
      <div class="stat"><div class="num" id="stat-tasks">0</div><div class="lbl">Tasks</div></div>
      <div class="stat"><div class="num" id="stat-done">0</div><div class="lbl">Done</div></div>
      <div class="stat"><div class="num" id="stat-pct">0%</div><div class="lbl">Complete</div></div>
    </div>
    <div class="user-info" id="user-info" style="display:none;">
      <span class="user-email" id="user-email-display"></span>
      <button class="btn btn-ghost btn-sm" id="signout-btn">Sign Out</button>
    </div>
  </div>
</header>

<main>
  <div id="categories-list"></div>
  <div class="empty" id="empty-state" style="display:none;">
    <div class="icon">📋</div>
    Loading your categories…
  </div>
</main>

<!-- Overlay to close status menu -->
<div id="overlay"></div>
<!-- Status menu -->
<div class="status-menu" id="status-menu" style="display:none;"></div>
<!-- Save indicator -->
<div id="save-indicator">✓ Saved</div>

<!-- ── Notes Modal ── -->
<div id="notes-modal-backdrop">
  <div id="notes-modal">
    <div class="notes-modal-header">
      <span class="notes-modal-icon">📝</span>
      <div class="notes-modal-title" id="notes-modal-title">Notes</div>
      <button class="notes-modal-close" id="notes-modal-close" title="Close">✕</button>
    </div>

    <div class="notes-toolbar" id="notes-toolbar">
      <!-- Text style -->
      <button class="toolbar-btn" data-cmd="bold"          title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="toolbar-btn" data-cmd="italic"        title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="toolbar-btn" data-cmd="underline"     title="Underline (Ctrl+U)"><u>U</u></button>
      <button class="toolbar-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
      <button class="toolbar-btn" data-cmd="hiliteColor" data-val="#fef9c3" title="Highlight">🖊</button>
      <div class="toolbar-sep"></div>
      <!-- Headings -->
      <button class="toolbar-btn" data-cmd="formatBlock" data-val="h1" title="Heading 1">H1</button>
      <button class="toolbar-btn" data-cmd="formatBlock" data-val="h2" title="Heading 2">H2</button>
      <button class="toolbar-btn" data-cmd="formatBlock" data-val="h3" title="Heading 3">H3</button>
      <div class="toolbar-sep"></div>
      <!-- Lists -->
      <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Bullet list">• List</button>
      <button class="toolbar-btn" data-cmd="insertOrderedList"   title="Numbered list">1. List</button>
      <div class="toolbar-sep"></div>
      <!-- Blocks -->
      <button class="toolbar-btn" data-cmd="formatBlock" data-val="blockquote" title="Blockquote">" "</button>
      <button class="toolbar-btn" data-cmd="formatBlock" data-val="pre"        title="Code block">&lt;/&gt;</button>
      <div class="toolbar-sep"></div>
      <!-- Indent -->
      <button class="toolbar-btn" data-cmd="indent"  title="Indent">→</button>
      <button class="toolbar-btn" data-cmd="outdent" title="Outdent">←</button>
      <div class="toolbar-sep"></div>
      <!-- Clear -->
      <button class="toolbar-btn" data-cmd="removeFormat" title="Remove formatting">✕ fmt</button>
    </div>

    <div class="notes-editor-wrap">
      <div id="notes-editor" contenteditable="true" spellcheck="true"></div>
    </div>

    <div class="notes-modal-footer">
      <span class="notes-char-count" id="notes-char-count">0 characters</span>
      <div class="notes-footer-actions">
        <button class="btn-notes-clear" id="notes-clear-btn">Clear Notes</button>
        <button class="btn-notes-save"  id="notes-save-btn">Save &amp; Close</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
           signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  // ── Firebase Config ────────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyCm5V7AfWZ4nu1goC6rvPFk5i5CJ_DTTKI",
    authDomain:        "health-8bf9e.firebaseapp.com",
    projectId:         "health-8bf9e",
    storageBucket:     "health-8bf9e.firebasestorage.app",
    messagingSenderId: "337607108367",
    appId:             "1:337607108367:web:9209c3ec283765a434c07a"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  // ── App State ─────────────────────────────────────────────────────────────
  let categories    = [];
  let nextCatId     = 1;
  let nextTaskId    = 1;
  let nextSubcatId  = 1;
  let currentUser   = null;
  let authMode      = 'signin';
  let activeCatId   = null;
  let activeSubcatId = null; // null = "All", or a subcategory id

  const MAX_CATS = 5;
  const FIXED_CATEGORIES = ['Goals', 'Lifestyle', 'Consultations', 'Adaptations', 'Stress Mgmt'];

  const STATUSES = [
    { key: 'not-started', label: 'Not Started', cls: 'status-not-started' },
    { key: 'in-progress', label: 'In Progress', cls: 'status-in-progress' },
    { key: 'done',        label: 'Done',        cls: 'status-done'        },
    { key: 'blocked',     label: 'Blocked',     cls: 'status-blocked'     },
  ];

  function statusInfo(key) { return STATUSES.find(s => s.key === key) || STATUSES[0]; }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Notes Modal State ──────────────────────────────────────────────────────
  let _notesCatId  = null;
  let _notesTaskId = null;

  // ── Firestore: Load & Save ─────────────────────────────────────────────────
  async function loadData(uid) {
    try {
      const snap = await getDoc(doc(db, 'users', uid));
      if (snap.exists()) {
        const data = snap.data();
        categories   = data.categories   || [];
        nextCatId    = data.nextCatId    || 1;
        nextTaskId   = data.nextTaskId   || 1;
        nextSubcatId = data.nextSubcatId || 1;
        if (categories.length) {
          const maxCat = Math.max(...categories.map(c => c.id));
          if (maxCat >= nextCatId) nextCatId = maxCat + 1;
        }
        const allTasks = categories.flatMap(c => c.tasks || []);
        if (allTasks.length) {
          const maxTask = Math.max(...allTasks.map(t => t.id));
          if (maxTask >= nextTaskId) nextTaskId = maxTask + 1;
        }
        const allSubcats = categories.flatMap(c => c.subcategories || []);
        if (allSubcats.length) {
          const maxSub = Math.max(...allSubcats.map(s => s.id));
          if (maxSub >= nextSubcatId) nextSubcatId = maxSub + 1;
        }
      }
    } catch (e) {
      console.error('Error loading data:', e);
    }

    // If no categories yet, seed the fixed five
    if (!categories.length) {
      categories = FIXED_CATEGORIES.map(name => ({
        id: nextCatId++, name, tasks: [], subcategories: [], open: true
      }));
      await saveData();
    }

    // Ensure all five fixed categories always exist (by name), preserving tasks
    FIXED_CATEGORIES.forEach(name => {
      if (!categories.find(c => c.name === name)) {
        categories.push({ id: nextCatId++, name, tasks: [], subcategories: [], open: true });
      }
    });
    // Keep only the five fixed categories
    categories = FIXED_CATEGORIES.map(name => categories.find(c => c.name === name));
    // Ensure every category has a subcategories array
    categories.forEach(c => { if (!c.subcategories) c.subcategories = []; });

    render();
  }

  let saveTimer = null;
  async function saveData() {
    if (!currentUser) return;
    const ind = document.getElementById('save-indicator');
    ind.classList.add('visible');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => ind.classList.remove('visible'), 1500);
    try {
      await setDoc(doc(db, 'users', currentUser.uid), {
        categories,
        nextCatId,
        nextTaskId,
        nextSubcatId,
        updatedAt: new Date().toISOString()
      });
    } catch (e) {
      console.error('Error saving data:', e);
    }
  }

  // ── Auth State ────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    document.getElementById('loading-screen').style.display = 'none';
    if (user) {
      currentUser = user;
      document.getElementById('auth-screen').style.display  = 'none';
      document.getElementById('user-info').style.display    = 'flex';
      document.getElementById('user-email-display').textContent = user.email;
      await loadData(user.uid);
    } else {
      currentUser = null;
      categories  = [];
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('user-info').style.display   = 'none';
      render();
    }
  });

  // ── Auth UI ───────────────────────────────────────────────────────────────
  async function submitAuth() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    errEl.textContent = '';

    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

    const btn = document.getElementById('auth-submit-btn');
    btn.textContent = authMode === 'signup' ? 'Creating account…' : 'Signing in…';
    btn.disabled = true;

    try {
      if (authMode === 'signup') {
        await createUserWithEmailAndPassword(auth, email, password);
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
    } catch (e) {
      const msgs = {
        'auth/user-not-found':         'No account found with this email.',
        'auth/wrong-password':         'Incorrect password.',
        'auth/invalid-credential':     'Incorrect email or password.',
        'auth/email-already-in-use':   'An account with this email already exists.',
        'auth/invalid-email':          'Please enter a valid email address.',
        'auth/too-many-requests':      'Too many attempts. Please try again later.',
        'auth/network-request-failed': 'Network error. Check your connection.',
      };
      errEl.textContent = msgs[e.code] || 'Something went wrong. Please try again.';
      btn.textContent = authMode === 'signup' ? 'Sign Up' : 'Sign In';
      btn.disabled = false;
    }
  }

  function toggleAuthMode() {
    authMode = authMode === 'signin' ? 'signup' : 'signin';
    const isSignUp = authMode === 'signup';
    document.getElementById('auth-subtitle').textContent    = isSignUp ? 'Create your account' : 'Sign in to your account';
    document.getElementById('auth-submit-btn').textContent  = isSignUp ? 'Sign Up' : 'Sign In';
    document.getElementById('auth-submit-btn').disabled     = false;
    document.getElementById('auth-switch-text').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
    document.getElementById('auth-switch-link').textContent = isSignUp ? ' Sign In' : ' Sign Up';
    document.getElementById('auth-error').textContent       = '';
  }

  document.getElementById('auth-submit-btn').addEventListener('click', submitAuth);
  document.getElementById('auth-switch-link').addEventListener('click', toggleAuthMode);
  ['auth-email', 'auth-password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') submitAuth();
    });
  });
  document.getElementById('signout-btn').addEventListener('click', () => signOut(auth));

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const list  = document.getElementById('categories-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    empty.style.display = categories.length ? 'none' : 'block';
    if (!categories.length) { updateStats(); return; }

    // Ensure activeCatId is valid
    if (!categories.find(c => c.id === activeCatId)) {
      activeCatId    = categories[0].id;
      activeSubcatId = null;
    }

    // ── Top category tab menu ──
    const menuWrap = document.createElement('div');
    menuWrap.className = 'cat-menu-wrap';
    categories.forEach(cat => {
      const total    = cat.tasks.length;
      const done     = cat.tasks.filter(t => t.status === 'done').length;
      const pct      = total ? Math.round(done / total * 100) : 0;
      const isActive = cat.id === activeCatId;
      const tab = document.createElement('button');
      tab.className      = 'cat-tab' + (isActive ? ' active' : '');
      tab.dataset.action = 'select-tab';
      tab.dataset.cat    = cat.id;
      tab.innerHTML = `
        <span class="cat-tab-name">${esc(cat.name)}</span>
        <span class="cat-tab-meta">
          <span>${done}/${total}</span>
          <span class="cat-tab-pct">${pct}%</span>
        </span>
        <div class="cat-tab-bar">
          <div class="cat-tab-progress" style="width:${pct}%"></div>
        </div>`;
      menuWrap.appendChild(tab);
    });
    list.appendChild(menuWrap);

    // ── Active category panel ──
    const cat = categories.find(c => c.id === activeCatId);
    if (!cat) { updateStats(); return; }

    const subcats = cat.subcategories || [];

    // Validate activeSubcatId
    if (activeSubcatId !== null && !subcats.find(s => s.id === activeSubcatId)) {
      activeSubcatId = subcats.length ? subcats[0].id : null;
    }
    // Auto-select first subcategory if none selected and subcats exist
    if (activeSubcatId === null && subcats.length > 0) {
      activeSubcatId = subcats[0].id;
    }

    const panel = document.createElement('div');
    panel.className = 'cat-panel';
    panel.id = `cat-${cat.id}`;

    // ── Left: Subcategory sidebar ──
    const sidebar = document.createElement('div');
    sidebar.className = 'subcat-sidebar';

    const sidebarTitle = document.createElement('div');
    sidebarTitle.className = 'subcat-sidebar-title';
    sidebarTitle.textContent = 'Subcategories';
    sidebar.appendChild(sidebarTitle);

    const subcatList = document.createElement('div');
    subcatList.className = 'subcat-list';

    subcats.forEach(sub => {
      const subTaskCount = cat.tasks.filter(t => t.subcatId === sub.id).length;
      const isActiveSub  = activeSubcatId === sub.id;
      const row = document.createElement('div');
      row.className = 'subcat-row' + (isActiveSub ? ' active' : '');
      row.innerHTML = `
        <button class="subcat-row-btn" data-action="select-subcat" data-cat="${cat.id}" data-subcat="${sub.id}">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(sub.name)}</span>
          <span class="subcat-row-count">${subTaskCount}</span>
        </button>
        <div class="subcat-row-actions">
          <button class="subcat-rename-btn" data-action="rename-subcat" data-cat="${cat.id}" data-subcat="${sub.id}" title="Rename">✏️</button>
          <button class="subcat-delete-btn" data-action="delete-subcat" data-cat="${cat.id}" data-subcat="${sub.id}" title="Delete">🗑️</button>
        </div>`;
      subcatList.appendChild(row);
    });
    sidebar.appendChild(subcatList);

    // Add subcategory button at bottom of sidebar
    const addSubRow = document.createElement('div');
    addSubRow.className = 'subcat-add-row';
    const addSubBtn = document.createElement('button');
    addSubBtn.className      = 'subcat-add-btn';
    addSubBtn.dataset.action = 'add-subcat';
    addSubBtn.dataset.cat    = cat.id;
    addSubBtn.textContent    = '+ Add Subcategory';
    addSubRow.appendChild(addSubBtn);
    sidebar.appendChild(addSubRow);

    panel.appendChild(sidebar);

    // ── Right: Task content area ──
    const content = document.createElement('div');
    content.className = 'subcat-content';

    if (subcats.length === 0) {
      // No subcategories yet — prompt user to create one
      content.innerHTML = `
        <div class="subcat-empty-prompt">
          <div class="icon">📂</div>
          <strong>No subcategories yet</strong>
          <span>Add a subcategory on the left to start tracking tasks.</span>
        </div>`;
    } else if (activeSubcatId === null) {
      content.innerHTML = `
        <div class="subcat-empty-prompt">
          <div class="icon">👈</div>
          <span>Select a subcategory to view its tasks.</span>
        </div>`;
    } else {
      const activeSub    = subcats.find(s => s.id === activeSubcatId);
      const visibleTasks = cat.tasks.filter(t => t.subcatId === activeSubcatId);

      const taskListDiv = document.createElement('div');
      taskListDiv.className = 'task-list';
      taskListDiv.id        = `tasks-${cat.id}`;
      taskListDiv.innerHTML = visibleTasks.map(t => taskRowHTML(cat.id, t)).join('');

      // Add task row
      const addRow = document.createElement('div');
      addRow.className = 'add-task-row';
      addRow.innerHTML = `
        <input class="add-task-input" id="new-task-${cat.id}"
          placeholder="Add a task to ${esc(activeSub.name)}…" maxlength="120"
          data-catid="${cat.id}" data-subcatid="${activeSubcatId}" />
        <button class="btn btn-primary btn-sm" data-action="add-task" data-cat="${cat.id}">Add</button>`;
      taskListDiv.appendChild(addRow);
      content.appendChild(taskListDiv);
    }

    panel.appendChild(content);
    list.appendChild(panel);
    updateStats();
  }

  function taskRowHTML(catId, t) {
    const si       = statusInfo(t.status);
    const hasNotes = t.notes && t.notes.trim() !== '' && t.notes !== '<br>';
    return `
      <div class="task-row" id="task-row-${t.id}">
        <div class="task-check ${t.status === 'done' ? 'done' : ''}"
          data-action="quick-toggle" data-cat="${catId}" data-task="${t.id}" title="Toggle done"></div>
        <span class="task-name ${t.status === 'done' ? 'done' : ''}"
          id="task-name-${t.id}">${esc(t.name)}</span>
        <button class="status-badge ${si.cls}"
          data-action="open-status" data-cat="${catId}" data-task="${t.id}">${si.label}</button>
        <div class="task-actions">
          <button class="btn-notes ${hasNotes ? 'has-notes' : ''}"
            data-action="open-notes" data-cat="${catId}" data-task="${t.id}"
            title="${hasNotes ? 'View/Edit Notes' : 'Add Notes'}">📝</button>
          <button class="btn-icon" data-action="edit-task" data-cat="${catId}" data-task="${t.id}" title="Rename">✏️</button>
          <button class="btn-icon" data-action="delete-task" data-cat="${catId}" data-task="${t.id}" title="Delete">🗑️</button>
        </div>
      </div>`;
  }

  function updateStats() {
    const allTasks = categories.flatMap(c => c.tasks);
    const done = allTasks.filter(t => t.status === 'done').length;
    document.getElementById('stat-cats').textContent  = categories.length;
    document.getElementById('stat-tasks').textContent = allTasks.length;
    document.getElementById('stat-done').textContent  = done;
    document.getElementById('stat-pct').textContent   = allTasks.length
      ? Math.round(done / allTasks.length * 100) + '%' : '0%';
  }

  // ── Event delegation ──────────────────────────────────────────────────────
  document.addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action  = el.dataset.action;
    const catId   = parseInt(el.dataset.cat);
    const taskId  = parseInt(el.dataset.task);

    if (action === 'select-tab')      { selectTab(catId); }
    if (action === 'select-subcat')   { selectSubcat(catId, el.dataset.subcat); }
    if (action === 'add-subcat')      { addSubcategory(catId); }
    if (action === 'rename-subcat')   { renameSubcategory(catId, parseInt(el.dataset.subcat)); }
    if (action === 'delete-subcat')   { deleteSubcategory(catId, parseInt(el.dataset.subcat)); }
    if (action === 'add-task')        { addTask(catId); }
    if (action === 'quick-toggle') { quickToggle(catId, taskId); }
    if (action === 'open-status')  { openStatusMenu(e, catId, taskId); }
    if (action === 'edit-task')    { editTaskName(catId, taskId); }
    if (action === 'delete-task')  { deleteTask(catId, taskId); }
    if (action === 'open-notes')   { openNotesModal(catId, taskId); }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.classList.contains('add-task-input')) {
      addTask(parseInt(e.target.dataset.catid));
    }
    if (e.key === 'Escape') {
      closeNotesModal(true);
    }
  });

  // ── Category ops ──────────────────────────────────────────────────────────

  function selectTab(id) {
    activeCatId    = id;
    activeSubcatId = null;
    render();
  }

  function selectSubcat(catId, subcatId) {
    activeCatId    = catId;
    activeSubcatId = subcatId === '' ? null : parseInt(subcatId);
    render();
  }

  function addSubcategory(catId) {
    const name = prompt('Enter subcategory name:');
    if (!name || !name.trim()) return;
    const cat = categories.find(c => c.id === catId);
    if (!cat.subcategories) cat.subcategories = [];
    const newSub = { id: nextSubcatId++, name: name.trim() };
    cat.subcategories.push(newSub);
    activeSubcatId = newSub.id;
    render(); saveData();
  }

  function renameSubcategory(catId, subcatId) {
    const cat = categories.find(c => c.id === catId);
    const sub = cat.subcategories.find(s => s.id === subcatId);
    const name = prompt('Rename subcategory:', sub.name);
    if (!name || !name.trim()) return;
    sub.name = name.trim();
    render(); saveData();
  }

  function deleteSubcategory(catId, subcatId) {
    if (!confirm('Delete this subcategory and all its tasks?')) return;
    const cat = categories.find(c => c.id === catId);
    cat.subcategories = cat.subcategories.filter(s => s.id !== subcatId);
    cat.tasks = cat.tasks.filter(t => t.subcatId !== subcatId);
    if (activeSubcatId === subcatId) {
      activeSubcatId = cat.subcategories.length ? cat.subcategories[0].id : null;
    }
    render(); saveData();
  }

  function deleteCategory(id) {
    if (!confirm('Delete this category and all its tasks?')) return;
    categories = categories.filter(c => c.id !== id);
    if (activeCatId === id) {
      activeCatId = categories.length ? categories[0].id : null;
    }
    render(); saveData();
  }

  function editCatName(id) {
    const cat  = categories.find(c => c.id === id);
    const span = document.getElementById(`cat-name-${id}`);
    const inp  = document.createElement('input');
    inp.className = 'cat-name-input';
    inp.value = cat.name;
    span.replaceWith(inp);
    inp.focus(); inp.select();
    const save = () => {
      const v = inp.value.trim();
      if (v) cat.name = v;
      render(); saveData();
    };
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { inp.value = cat.name; inp.blur(); }
    });
  }

  // ── Task ops ──────────────────────────────────────────────────────────────
  function addTask(catId) {
    const inp     = document.getElementById(`new-task-${catId}`);
    const name    = inp.value.trim();
    if (!name) { inp.focus(); return; }
    const cat     = categories.find(c => c.id === catId);
    const subcatId = inp.dataset.subcatid ? parseInt(inp.dataset.subcatid) : null;
    cat.tasks.push({ id: nextTaskId++, name, status: 'not-started', notes: '', subcatId: subcatId || null });
    inp.value = '';
    render(); saveData();
    const el = document.getElementById(`new-task-${catId}`);
    if (el) el.focus();
  }

  function deleteTask(catId, taskId) {
    const cat = categories.find(c => c.id === catId);
    cat.tasks = cat.tasks.filter(t => t.id !== taskId);
    render(); saveData();
  }

  function quickToggle(catId, taskId) {
    const cat  = categories.find(c => c.id === catId);
    const task = cat.tasks.find(t => t.id === taskId);
    task.status = task.status === 'done' ? 'not-started' : 'done';
    render(); saveData();
  }

  function editTaskName(catId, taskId) {
    const cat  = categories.find(c => c.id === catId);
    const task = cat.tasks.find(t => t.id === taskId);
    const span = document.getElementById(`task-name-${taskId}`);
    const inp  = document.createElement('input');
    inp.className = 'task-name-input';
    inp.value = task.name;
    span.replaceWith(inp);
    inp.focus(); inp.select();
    const save = () => {
      const v = inp.value.trim();
      if (v) task.name = v;
      render(); saveData();
    };
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { inp.value = task.name; inp.blur(); }
    });
  }

  // ── Status menu ───────────────────────────────────────────────────────────
  let _menuCatId = null, _menuTaskId = null;

  function openStatusMenu(e, catId, taskId) {
    e.stopPropagation();
    _menuCatId = catId; _menuTaskId = taskId;
    const menu = document.getElementById('status-menu');
    menu.innerHTML = STATUSES.map(s =>
      `<button data-action="set-status" data-key="${s.key}" class="${s.cls}">${s.label}</button>`
    ).join('');
    const rect = e.target.getBoundingClientRect();
    menu.style.display = 'block';
    menu.style.top  = (rect.bottom + 6) + 'px';
    menu.style.left = rect.left + 'px';
    document.getElementById('overlay').classList.add('visible');
  }

  document.getElementById('status-menu').addEventListener('click', e => {
    const btn = e.target.closest('[data-action="set-status"]');
    if (!btn) return;
    const cat  = categories.find(c => c.id === _menuCatId);
    const task = cat.tasks.find(t => t.id === _menuTaskId);
    task.status = btn.dataset.key;
    closeStatusMenu();
    render(); saveData();
  });

  function closeStatusMenu() {
    document.getElementById('status-menu').style.display = 'none';
    document.getElementById('overlay').classList.remove('visible');
    _menuCatId = _menuTaskId = null;
  }

  document.getElementById('overlay').addEventListener('click', closeStatusMenu);

  // ── Notes Modal ───────────────────────────────────────────────────────────
  const notesBackdrop = document.getElementById('notes-modal-backdrop');
  const notesEditor   = document.getElementById('notes-editor');
  const notesTitle    = document.getElementById('notes-modal-title');
  const notesCount    = document.getElementById('notes-char-count');

  function openNotesModal(catId, taskId) {
    const cat  = categories.find(c => c.id === catId);
    const task = cat.tasks.find(t => t.id === taskId);
    _notesCatId  = catId;
    _notesTaskId = taskId;

    notesTitle.innerHTML = `<span>Notes —</span> ${esc(task.name)}`;
    notesEditor.innerHTML = task.notes || '';
    updateCharCount();

    notesBackdrop.classList.add('visible');
    // Focus editor after animation
    setTimeout(() => notesEditor.focus(), 180);
  }

  function saveNotes() {
    if (_notesCatId == null || _notesTaskId == null) return;
    const cat  = categories.find(c => c.id === _notesCatId);
    const task = cat?.tasks.find(t => t.id === _notesTaskId);
    if (task) {
      task.notes = notesEditor.innerHTML;
      saveData();
      // Update the notes button indicator in place without full re-render
      const btn = document.querySelector(
        `[data-action="open-notes"][data-cat="${_notesCatId}"][data-task="${_notesTaskId}"]`
      );
      if (btn) {
        const hasNotes = task.notes && task.notes.trim() !== '' && task.notes !== '<br>';
        btn.classList.toggle('has-notes', hasNotes);
        btn.title = hasNotes ? 'View/Edit Notes' : 'Add Notes';
      }
    }
  }

  function closeNotesModal(save = true) {
    if (!notesBackdrop.classList.contains('visible')) return;
    if (save) saveNotes();
    notesBackdrop.classList.remove('visible');
    _notesCatId = _notesTaskId = null;
  }

  function updateCharCount() {
    const text = notesEditor.innerText || '';
    const len  = text.replace(/\s+/g, '').length; // count non-whitespace chars
    notesCount.textContent = `${text.length} characters`;
  }

  // Save & Close button
  document.getElementById('notes-save-btn').addEventListener('click', () => closeNotesModal(true));

  // Close (X) button — also saves
  document.getElementById('notes-modal-close').addEventListener('click', () => closeNotesModal(true));

  // Click outside modal to close (saves)
  notesBackdrop.addEventListener('click', e => {
    if (e.target === notesBackdrop) closeNotesModal(true);
  });

  // Clear notes button
  document.getElementById('notes-clear-btn').addEventListener('click', () => {
    if (!confirm('Clear all notes for this task?')) return;
    notesEditor.innerHTML = '';
    updateCharCount();
  });

  // Character count update
  notesEditor.addEventListener('input', updateCharCount);

  // ── Formatting toolbar ────────────────────────────────────────────────────
  document.getElementById('notes-toolbar').addEventListener('mousedown', e => {
    const btn = e.target.closest('.toolbar-btn');
    if (!btn) return;
    e.preventDefault(); // keep editor focus
    const cmd = btn.dataset.cmd;
    const val = btn.dataset.val || null;
    document.execCommand(cmd, false, val);
    notesEditor.focus();
    updateCharCount();
  });

  // Toolbar active state on selection change
  document.addEventListener('selectionchange', () => {
    if (!notesBackdrop.classList.contains('visible')) return;
    document.querySelectorAll('.toolbar-btn[data-cmd]').forEach(btn => {
      const cmd = btn.dataset.cmd;
      if (['bold','italic','underline','strikeThrough',
           'insertUnorderedList','insertOrderedList'].includes(cmd)) {
        btn.classList.toggle('active', document.queryCommandState(cmd));
      }
    });
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
