<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #eef2ff;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --green: #22c55e;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --gray: #94a3b8;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: var(--accent); }
    .header-stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat .num { font-size: 1.3rem; font-weight: 700; }
    .stat .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Main layout ── */
    main { max-width: 860px; margin: 0 auto; padding: 32px 20px 0; }

    /* ── Add category bar ── */
    .add-cat-bar {
      display: flex; gap: 10px; margin-bottom: 28px;
    }
    .add-cat-bar input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      background: var(--surface);
    }
    .add-cat-bar input:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-sm { padding: 6px 12px; font-size: 0.82rem; border-radius: 7px; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: var(--danger-light); color: var(--danger); border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-icon {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); padding: 4px 6px; border-radius: 6px;
      font-size: 1rem; line-height: 1; transition: background 0.12s, color 0.12s;
    }
    .btn-icon:hover { background: var(--bg); color: var(--text); }

    /* ── Category card ── */
    .category {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .cat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: #fafbff;
    }
    .cat-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.85rem; padding: 2px 4px;
      transition: transform 0.2s;
    }
    .cat-toggle.open { transform: rotate(90deg); }
    .cat-name-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
    .cat-name { font-weight: 700; font-size: 1rem; }
    .cat-name-input {
      font-weight: 700; font-size: 1rem;
      border: 1.5px solid var(--accent);
      border-radius: 6px; padding: 3px 8px;
      outline: none; width: 200px;
    }
    .cat-count {
      font-size: 0.78rem; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 10px;
    }
    .progress-bar-wrap {
      flex: 1; max-width: 140px;
      background: var(--border); border-radius: 20px; height: 6px;
      overflow: hidden;
    }
    .progress-bar { height: 100%; border-radius: 20px; background: var(--green); transition: width 0.35s; }
    .progress-pct { font-size: 0.78rem; color: var(--muted); min-width: 34px; text-align: right; }
    .cat-actions { display: flex; gap: 4px; }

    /* ── Task list ── */
    .task-list { padding: 4px 0 8px; }
    .task-list.collapsed { display: none; }

    .task-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #fafbff; }

    .task-check {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .task-check.done { border-color: var(--green); background: var(--green); }
    .task-check.done::after { content: '✓'; color: #fff; font-size: 0.65rem; font-weight: 900; }

    .task-name { flex: 1; font-size: 0.92rem; }
    .task-name.done { text-decoration: line-through; color: var(--muted); }
    .task-name-input {
      flex: 1; font-size: 0.92rem;
      border: 1.5px solid var(--accent); border-radius: 6px;
      padding: 3px 8px; outline: none;
    }

    .status-badge {
      font-size: 0.72rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      cursor: pointer; white-space: nowrap;
      border: none; transition: opacity 0.15s;
    }
    .status-badge:hover { opacity: 0.8; }
    .status-not-started { background: #f1f5f9; color: #475569; }
    .status-in-progress { background: #eff6ff; color: #2563eb; }
    .status-done        { background: #f0fdf4; color: #16a34a; }
    .status-blocked     { background: #fff7ed; color: #c2410c; }

    .task-actions { display: flex; gap: 2px; }

    /* ── Add task row ── */
    .add-task-row {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 18px 12px;
    }
    .add-task-input {
      flex: 1; padding: 7px 12px;
      border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 0.88rem; outline: none;
      transition: border-color 0.15s;
      background: var(--surface);
    }
    .add-task-input:focus { border-color: var(--accent); }

    /* ── Status selector modal-like dropdown ── */
    .status-menu {
      position: fixed; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-md); z-index: 500;
      overflow: hidden; min-width: 150px;
    }
    .status-menu button {
      display: block; width: 100%; padding: 9px 14px;
      text-align: left; background: none; border: none;
      cursor: pointer; font-size: 0.88rem; font-weight: 500;
      transition: background 0.1s;
    }
    .status-menu button:hover { background: var(--bg); }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 0.92rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0; z-index: 400;
      display: none;
    }
    #overlay.visible { display: block; }
  </style>
</head>
<body>

<header>
  <h1>Project <span>Tracker</span></h1>
  <div class="header-stats">
    <div class="stat"><div class="num" id="stat-cats">0</div><div class="lbl">Categories</div></div>
    <div class="stat"><div class="num" id="stat-tasks">0</div><div class="lbl">Tasks</div></div>
    <div class="stat"><div class="num" id="stat-done">0</div><div class="lbl">Done</div></div>
    <div class="stat"><div class="num" id="stat-pct">0%</div><div class="lbl">Complete</div></div>
  </div>
</header>

<main>
  <div class="add-cat-bar">
    <input type="text" id="new-cat-input" placeholder="New category name…" maxlength="80" />
    <button class="btn btn-primary" onclick="addCategory()">+ Add Category</button>
  </div>
  <div id="categories-list"></div>
  <div class="empty" id="empty-state">
    <div class="icon">📋</div>
    Add a category above to get started.
  </div>
</main>

<!-- Overlay to close status menu -->
<div id="overlay" onclick="closeStatusMenu()"></div>
<!-- Status menu -->
<div class="status-menu" id="status-menu" style="display:none;"></div>

<script>
  // ── Data ──────────────────────────────────────────────────────────────────
  let categories = [];
  let nextCatId = 1;
  let nextTaskId = 1;

  const STATUSES = [
    { key: 'not-started', label: 'Not Started', cls: 'status-not-started' },
    { key: 'in-progress', label: 'In Progress', cls: 'status-in-progress' },
    { key: 'done',        label: 'Done',        cls: 'status-done'        },
    { key: 'blocked',     label: 'Blocked',     cls: 'status-blocked'     },
  ];

  function statusInfo(key) { return STATUSES.find(s => s.key === key) || STATUSES[0]; }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('categories-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';
    empty.style.display = categories.length ? 'none' : 'block';

    categories.forEach(cat => {
      const total = cat.tasks.length;
      const done  = cat.tasks.filter(t => t.status === 'done').length;
      const pct   = total ? Math.round(done / total * 100) : 0;

      const card = document.createElement('div');
      card.className = 'category';
      card.id = `cat-${cat.id}`;

      card.innerHTML = `
        <div class="cat-header">
          <button class="cat-toggle ${cat.open ? 'open' : ''}" onclick="toggleCat(${cat.id})" title="Expand/Collapse">▶</button>
          <div class="cat-name-wrap">
            <span class="cat-name" id="cat-name-${cat.id}">${esc(cat.name)}</span>
            <span class="cat-count">${done}/${total} done</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
          <span class="progress-pct">${pct}%</span>
          <div class="cat-actions">
            <button class="btn-icon" onclick="editCatName(${cat.id})" title="Rename">✏️</button>
            <button class="btn-icon" onclick="deleteCategory(${cat.id})" title="Delete">🗑️</button>
          </div>
        </div>
        <div class="task-list ${cat.open ? '' : 'collapsed'}" id="tasks-${cat.id}">
          ${cat.tasks.map(t => taskRowHTML(cat.id, t)).join('')}
          <div class="add-task-row">
            <input class="add-task-input" id="new-task-${cat.id}" placeholder="Add a task…" maxlength="120"
              onkeydown="if(event.key==='Enter') addTask(${cat.id})" />
            <button class="btn btn-primary btn-sm" onclick="addTask(${cat.id})">Add</button>
          </div>
        </div>
      `;
      list.appendChild(card);
    });

    updateStats();
  }

  function taskRowHTML(catId, t) {
    const si = statusInfo(t.status);
    return `
      <div class="task-row" id="task-row-${t.id}">
        <div class="task-check ${t.status === 'done' ? 'done' : ''}"
          onclick="quickToggle(${catId}, ${t.id})" title="Toggle done"></div>
        <span class="task-name ${t.status === 'done' ? 'done' : ''}"
          id="task-name-${t.id}">${esc(t.name)}</span>
        <button class="status-badge ${si.cls}"
          onclick="openStatusMenu(event, ${catId}, ${t.id})">${si.label}</button>
        <div class="task-actions">
          <button class="btn-icon" onclick="editTaskName(${catId}, ${t.id})" title="Rename">✏️</button>
          <button class="btn-icon" onclick="deleteTask(${catId}, ${t.id})" title="Delete">🗑️</button>
        </div>
      </div>`;
  }

  function updateStats() {
    const allTasks = categories.flatMap(c => c.tasks);
    const done = allTasks.filter(t => t.status === 'done').length;
    document.getElementById('stat-cats').textContent  = categories.length;
    document.getElementById('stat-tasks').textContent = allTasks.length;
    document.getElementById('stat-done').textContent  = done;
    document.getElementById('stat-pct').textContent   = allTasks.length
      ? Math.round(done / allTasks.length * 100) + '%' : '0%';
  }

  // ── Category ops ──────────────────────────────────────────────────────────
  function addCategory() {
    const inp = document.getElementById('new-cat-input');
    const name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    categories.push({ id: nextCatId++, name, tasks: [], open: true });
    inp.value = '';
    render();
    inp.focus();
  }
  document.getElementById('new-cat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCategory();
  });

  function toggleCat(id) {
    const cat = categories.find(c => c.id === id);
    if (cat) { cat.open = !cat.open; render(); }
  }

  function deleteCategory(id) {
    if (!confirm('Delete this category and all its tasks?')) return;
    categories = categories.filter(c => c.id !== id);
    render();
  }

  function editCatName(id) {
    const cat = categories.find(c => c.id === id);
    const span = document.getElementById(`cat-name-${id}`);
    const inp = document.createElement('input');
    inp.className = 'cat-name-input';
    inp.value = cat.name;
    span.replaceWith(inp);
    inp.focus();
    inp.select();
    const save = () => {
      const v = inp.value.trim();
      if (v) cat.name = v;
      render();
    };
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = cat.name; inp.blur(); } });
  }

  // ── Task ops ──────────────────────────────────────────────────────────────
  function addTask(catId) {
    const inp = document.getElementById(`new-task-${catId}`);
    const name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    const cat = categories.find(c => c.id === catId);
    cat.tasks.push({ id: nextTaskId++, name, status: 'not-started' });
    inp.value = '';
    render();
    document.getElementById(`new-task-${catId}`).focus();
  }

  function deleteTask(catId, taskId) {
    const cat = categories.find(c => c.id === catId);
    cat.tasks = cat.tasks.filter(t => t.id !== taskId);
    render();
  }

  function quickToggle(catId, taskId) {
    const cat = categories.find(c => c.id === catId);
    const task = cat.tasks.find(t => t.id === taskId);
    task.status = task.status === 'done' ? 'not-started' : 'done';
    render();
  }

  function editTaskName(catId, taskId) {
    const cat = categories.find(c => c.id === catId);
    const task = cat.tasks.find(t => t.id === taskId);
    const span = document.getElementById(`task-name-${taskId}`);
    const inp = document.createElement('input');
    inp.className = 'task-name-input';
    inp.value = task.name;
    span.replaceWith(inp);
    inp.focus();
    inp.select();
    const save = () => {
      const v = inp.value.trim();
      if (v) task.name = v;
      render();
    };
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = task.name; inp.blur(); } });
  }

  // ── Status menu ───────────────────────────────────────────────────────────
  let _menuCatId = null, _menuTaskId = null;

  function openStatusMenu(e, catId, taskId) {
    e.stopPropagation();
    _menuCatId = catId; _menuTaskId = taskId;
    const menu = document.getElementById('status-menu');
    menu.innerHTML = STATUSES.map(s =>
      `<button onclick="setStatus('${s.key}')" class="${s.cls}">${s.label}</button>`
    ).join('');
    const rect = e.target.getBoundingClientRect();
    menu.style.display = 'block';
    menu.style.top  = (rect.bottom + 6) + 'px';
    menu.style.left = rect.left + 'px';
    document.getElementById('overlay').classList.add('visible');
  }

  function setStatus(key) {
    const cat = categories.find(c => c.id === _menuCatId);
    const task = cat.tasks.find(t => t.id === _menuTaskId);
    task.status = key;
    closeStatusMenu();
    render();
  }

  function closeStatusMenu() {
    document.getElementById('status-menu').style.display = 'none';
    document.getElementById('overlay').classList.remove('visible');
    _menuCatId = _menuTaskId = null;
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
